<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة توليد واسترجاع الباركود الذكي</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        input:disabled {
            background-color: #e9ecef;
            color: #333;
            font-weight: bold;
        }
        .buttons-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
            text-align: center;
        }
        .btn-save {
            background-color: #28a745;
            color: white;
        }
        .btn-save:hover {
            background-color: #218838;
        }
        .btn-qr {
            background-color: #17a2b8;
            color: white;
        }
        .btn-qr:hover {
            background-color: #138496;
        }
        .btn-qr:disabled {
            background-color: #6c757d;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-edit {
            background-color: #007bff;
            color: white;
        }
        .btn-edit:hover {
            background-color: #0069d9;
        }
        .qr-section {
            margin-top: 25px;
            text-align: center;
            display: none;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .qr-section p {
            font-size: 13px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        /* تنسيق شاشة قفل تجديد الاشتراك لصاحب المحل */
        .lock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .lock-box {
            background: #12131a;
            padding: 30px 20px;
            border-radius: 16px;
            border: 1px solid #1f222f;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .lock-box h3 { color: #d4a359; margin-bottom: 15px; }
        .lock-box p { color: #a0aec0; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
        .code-display {
            font-size: 24px; font-weight: bold; color: #ffffff;
            background: #1f222f; padding: 10px; border-radius: 6px;
            letter-spacing: 4px; margin-bottom: 20px; border: 1px dashed #d4a359;
        }
        .lock-box input {
            background: #1f222f; color: #fff; border: 1px solid #2d3142;
            text-align: center; font-size: 18px; letter-spacing: 2px; margin-bottom: 15px;
        }
        .lock-box input:focus { border-color: #d4a359; }
        .btn-unlock { background-color: #d4a359; color: #0b0c10; font-weight: bold; }
        .btn-unlock:hover { background-color: #bfa147; }
    </style>
</head>
<body>

<!-- شاشة قفل تفعيل الاشتراك الشهري لصاحب المحل -->
<div id="lockOverlay" class="lock-overlay" style="display: none;">
    <div class="lock-box">
        <h3>🔐 تفعيل الاشتراك الشهري</h3>
        <p>انتهت صلاحية النظام لهذا الشهر. يرجى تزويد الإدارة بالرمز التالي للحصول على كود التجديد:</p>
        <div id="randomCodeDisplay" class="code-display">0000</div>
        <div class="form-group">
            <input type="number" id="activationKeyInput" placeholder="أدخل كود التفعيل هنا">
        </div>
        <button type="button" class="btn btn-unlock" onclick="checkActivation()">تفعيل النظام</button>
    </div>
</div>

<div class="container">
    <h2>حفظ البيانات بالباركود الذكي</h2>
    
    <form id="infoForm">
        <!-- 1_ حقل مستطيل للايميل -->
        <div class="form-group">
            <label for="email">البريد الإلكتروني (Email)</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <!-- 2_ حقل مستطيل للباسورد -->
        <div class="form-group">
            <label for="password">كلمة المرور (Password)</label>
            <input type="text" id="password" placeholder="••••••••" required>
        </div>

        <!-- الحقل الجديد: حقل مستطيل لرقم الهاتف تحت الباسورد مباشرة -->
        <div class="form-group">
            <label for="phone">رقم الهاتف (Phone Number)</label>
            <input type="tel" id="phone" placeholder="07xxxxxxxx" required>
        </div>

        <!-- 3_ حقل مستطيل للمواليد -->
        <div class="form-group">
            <label for="birthdate">تاريخ الميلاد (Birthdate)</label>
            <input type="date" id="birthdate" required>
        </div>

        <!-- الأزرار مرتبة تحت بعضها -->
        <div class="buttons-stack">
            <button type="submit" id="saveBtn" class="btn btn-save">حفظ / Save</button>
            <button type="button" id="editBtn" class="btn btn-edit" style="display: none;">تعديل المعلومات</button>
            <button type="button" id="generateQrBtn" class="btn btn-qr" disabled>إنشاء باركود QR</button>
        </div>
    </form>

    <div id="qrSection" class="qr-section">
        <p>✅ تم إنشاء الباركود الخاص ببياناتك بنجاح! يمكنك تصويره الآن لفتحه من أي جهاز آخر.</p>
        <div id="qrcode"></div>
    </div>
</div>

<!-- مكتبة توليد الـ QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    const form = document.getElementById('infoForm');
    const inputs = form.querySelectorAll('input');
    const saveBtn = document.getElementById('saveBtn');
    const editBtn = document.getElementById('editBtn');
    const generateQrBtn = document.getElementById('generateQrBtn');
    const qrSection = document.getElementById('qrSection');
    const qrcodeDiv = document.getElementById('qrcode');

    let generatedUrl = "";
    let systemRandomCode = 0;
    let isCustomerMode = false; // متغير لمعرفة هل تصفح الصفحة حالياً هو زبون أم صاحب محل

    // --- نظام فحص صلاحية اشتراك صاحب المحل (30 يوم) ---
    function checkSystemAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        // إذا كان الرابط يحتوي على معلمات الزبون (?e=) فلا نقفل الصفحة عليه، القفل فقط لصاحب المحل عند فتح الواجهة فارغة
        if (urlParams.get('e')) return;

        const expiryKey = localStorage.getItem('owner_expiry_date');
        const today = new Date().toISOString().split('T')[0];

        // إذا لم يكن هناك تاريخ مسجل مسبقاً أو انتهت الـ 30 يوماً، يظهر القفل فوراً
        if (!expiryKey || today > expiryKey) {
            systemRandomCode = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('randomCodeDisplay').innerText = systemRandomCode;
            document.getElementById('lockOverlay').style.display = 'flex';
        }
    }

    // دالة التحقق من كود التفعيل عند إدخاله (الرمز العشوائي + 2026)
    function checkActivation() {
        const userInput = parseInt(document.getElementById('activationKeyInput').value);
        const correctAnswer = systemRandomCode + 2026;

        if (userInput === correctAnswer) {
            const newExpiry = new Date();
            newExpiry.setDate(newExpiry.getDate() + 30);
            localStorage.setItem('owner_expiry_date', newExpiry.toISOString().split('T')[0]);
            
            document.getElementById('lockOverlay').style.display = 'none';
            alert('🎉 تم تفعيل النظام بنجاح لمدة 30 يوماً كاملة!');
        } else {
            alert('❌ كود التفعيل غير صحيح! يرجى مراجعة الإدارة.');
        }
    }

    // دالة مخصصة لتحديث وتوليد الـ QR Code مباشرة على الشاشة دون الحاجة لضغط زر توليد
    function refreshQRCode(url) {
        qrcodeDiv.innerHTML = ""; 
        new QRCode(qrcodeDiv, {
            text: url,
            width: 180,
            height: 180
        });
        qrSection.style.display = 'block';
    }

    // جلب البيانات تلقائياً شاملة رقم الهاتف إذا تم فتح الصفحة عن طريق مسح الباركود للزبون
    window.addEventListener('DOMContentLoaded', () => {
        checkSystemAccess();

        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('e');
        const passParam = urlParams.get('p');
        const phoneParam = urlParams.get('ph'); 
        const dateParam = urlParams.get('d');

        if (emailParam && passParam && phoneParam && dateParam) {
            isCustomerMode = true; // تفعيل وضع الزبون

            // فك التشفير وعرض بيانات صاحب الكود فوراً
            document.getElementById('email').value = atob(emailParam);
            document.getElementById('password').value = atob(passParam);
            document.getElementById('phone').value = atob(phoneParam);
            document.getElementById('birthdate').value = dateParam;

            // قفل الحقول وإظهار زر التعديل
            inputs.forEach(input => input.disabled = true);
            saveBtn.style.display = 'none';
            editBtn.style.display = 'block';
            
            // إخفاء زر إنشاء باركود QR تماماً للزبون بناءً على طلبك
            generateQrBtn.style.display = 'none';

            // عرض الباركود الحالي للزبون تلقائياً في الأسفل لكي يتم تحديثه فوراً عند أي تعديل لاحق
            generatedUrl = window.location.href;
            refreshQRCode(generatedUrl);
        }
    });

    // عند الضغط على زر "حفظ / Save"
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const birthdate = document.getElementById('birthdate').value;

        // تشفير البيانات بـ Base64 لدمجها داخل الرابط
        const encEmail = btoa(email);
        const encPass = btoa(password);
        const encPhone = btoa(phone);

        // تجهيز الرابط المحدث شاملاً رقم الهاتف
        generatedUrl = window.location.origin + window.location.pathname + `?e=${encEmail}&p=${encPass}&ph=${encPhone}&d=${birthdate}`;

        // قفل الحقول لمنع التعديل بالخطأ
        inputs.forEach(input => input.disabled = true);
        
        // إخفاء زر حفظ وإظهار زر تعد المعلومات
        saveBtn.style.display = 'none';
        editBtn.style.display = 'block';

        // تحديث شريط المتصفح بالبيانات والرابط الجديد فوراً لضمان ثبات التعديلات للزبون
        window.history.pushState({}, '', generatedUrl);

        // إذا كنا في وضع الزبون، نقوم بتحديث الباركود تلقائياً على الشاشة دون الحاجة لزر التوليد المفتعل
        if (isCustomerMode) {
            refreshQRCode(generatedUrl);
            alert('✅ تم حفظ تعديلاتك وتحديث الباركود الخاص بك بنجاح!');
        } else {
            // إذا كان صاحب المحل هو من ينشئ الكود أول مرة، نفعّل له زر إنشاء باركود
            generateQrBtn.disabled = false;
            alert('تم حفظ البيانات محلياً! اضغط الآن على زر "إنشاء باركود QR" لتوليد الكود الجديد الخاص بك.');
        }
    });

    // عند الضغط على زر "إنشاء باركود QR" (خاص بصاحب المحل فقط عند الإنشاء الأول)
    generateQrBtn.addEventListener('click', function() {
        if (!generatedUrl) return;
        window.history.pushState({}, '', generatedUrl);
        refreshQRCode(generatedUrl);
    });

    // عند رغبة المستخدم أو الزبون في تعديل المعلومات
    editBtn.addEventListener('click', function() {
        inputs.forEach(input => input.disabled = false);
        editBtn.style.display = 'none';
        saveBtn.style.display = 'block';
        
        if (!isCustomerMode) {
            generateQrBtn.disabled = true; 
            qrSection.style.display = 'none'; 
        }
    });
</script>

</body>
</html>
