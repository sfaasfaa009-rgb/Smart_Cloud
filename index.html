<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة المعلومات - نسخة محمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* ===== شاشة القفل ===== */
        #lockScreen {
            text-align: center;
            padding: 20px 0;
        }

        #lockScreen .lock-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        #lockScreen h1 {
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 28px;
        }

        #lockScreen .device-code {
            font-size: 64px;
            font-weight: 900;
            color: #667eea;
            background: #ebf4ff;
            padding: 15px 40px;
            border-radius: 16px;
            display: inline-block;
            margin: 20px 0;
            letter-spacing: 8px;
            border: 3px dashed #667eea;
        }

        #lockScreen .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        #lockScreen .input-group input {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 4px;
            background: #f7fafc;
            transition: 0.3s;
            direction: ltr;
        }

        #lockScreen .input-group input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        #lockScreen .input-group .error-msg {
            color: #e53e3e;
            font-weight: 600;
            font-size: 14px;
            min-height: 24px;
        }

        #lockScreen .input-group .success-msg {
            color: #38a169;
            font-weight: 600;
            font-size: 14px;
            min-height: 24px;
        }

        .btn-lock {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            padding: 16px;
            font-size: 20px;
        }

        .btn-lock:hover {
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4);
            transform: scale(1.02);
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            display: none;
        }

        .main-content.active {
            display: block;
        }

        .main-content h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .field {
            margin-bottom: 18px;
            position: relative;
        }

        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 14px;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f7fafc;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            font-size: 18px;
            user-select: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-pink:hover {
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-green {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .btn-green:hover {
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4);
        }

        .btn-orange {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }

        .btn-orange:hover {
            box-shadow: 0 8px 20px rgba(237, 137, 54, 0.4);
        }

        .qr-section-box {
            margin: 25px 0;
            padding: 20px;
            background: #f7fafc;
            border-radius: 16px;
            text-align: center;
            border: 2px dashed #cbd5e0;
        }

        .qr-code-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            min-height: 200px;
            background: white;
            border-radius: 12px;
            padding: 15px;
        }

        .qr-code-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .qr-note {
            color: #718096;
            font-size: 12px;
            margin-top: 10px;
        }

        .loading {
            color: #667eea;
            font-weight: 600;
        }

        .success-msg {
            background: #c6f6d5;
            color: #22543d;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .success-msg.show {
            display: block;
        }

        /* ===== صفحة العرض ===== */
        .info-page {
            display: none;
        }

        .info-page.active {
            display: block;
        }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            border: 3px solid #667eea;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
        }

        .info-card .card-title {
            text-align: center;
            color: #1a202c;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .info-card .info-field {
            margin-bottom: 20px;
        }

        .info-card .info-field label {
            display: block;
            font-weight: 700;
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .info-card .info-field .value-box {
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            color: #2d3748;
            font-weight: 500;
            word-break: break-all;
            background: #f7fafc;
            transition: 0.3s;
        }

        .info-card .info-field .value-box.email-box { border-color: #667eea; background: #ebf4ff; color: #2b6cb0; }
        .info-card .info-field .value-box.password-box { border-color: #9f7aea; background: #faf5ff; color: #6b46c1; }
        .info-card .info-field .value-box.phone-box { border-color: #48bb78; background: #f0fff4; color: #276749; }
        .info-card .info-field .value-box.birthdate-box { border-color: #ed8936; background: #fffaf0; color: #c05621; }

        .info-card .info-field .value-box.editable {
            background: white;
            border-color: #e53e3e;
            border-width: 2px;
            box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            flex: 1;
            min-width: 120px;
        }

        .back-btn {
            margin-top: 10px;
            background: #718096;
        }

        .edit-mode-badge {
            text-align: center;
            background: #fefcbf;
            color: #975a16;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            border: 2px solid #f6c23e;
            display: none;
        }

        .edit-mode-badge.active {
            display: block;
        }

        @media (max-width: 600px) {
            .container { padding: 18px; }
            .info-card { padding: 20px; }
            .action-buttons { flex-direction: column; }
            .action-buttons button { min-width: auto; }
            #lockScreen .device-code { font-size: 48px; padding: 12px 20px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ===== شاشة القفل ===== -->
    <div id="lockScreen">
        <div class="lock-icon">🔒</div>
        <h1>تطبيق محمي</h1>
        <div class="device-code" id="deviceCode">----</div>
        <div class="input-group">
            <input type="text" id="lockCodeInput" placeholder="أدخل رمز الدخول" maxlength="10" inputmode="numeric" dir="ltr">
            <div id="lockError" class="error-msg"></div>
            <div id="lockSuccess" class="success-msg"></div>
            <button class="btn-lock" id="unlockBtn">🔓 فتح التطبيق</button>
        </div>
    </div>

    <!-- ===== المحتوى الرئيسي ===== -->
    <div class="main-content" id="mainContent">
        <h1>📝 مدونة المعلومات</h1>
        
        <form id="infoForm">
            <div class="field">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="field">
                <label>🔑 كلمة المرور</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="********" required>
                    <span class="toggle-password" id="toggleMainPassword">👁️</span>
                </div>
            </div>
            <div class="field">
                <label>📞 رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>

            <div class="field">
                <label>🎂 تاريخ الميلاد</label>
                <input type="date" id="birthdate" required>

            <button type="submit" id="saveBtn">💾 حفظ المعلومات</button>
            <div class="success-msg" id="successMsg">✅ تم حفظ المعلومات بنجاح!</div>
        </form>

        <div class="qr-section-box" id="qrSection">
            <h3>📱 رمز QR الثابت والدائم</h3>
            <div class="qr-code-container" id="qrCodeContainer">
                <p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>
            </div>
            <button class="btn-pink" id="generateQrBtn">🔄 عرض كود QR للحساب الحالي</button>
            <p class="qr-note">📸 هذا الكود ينقل البيانات تلقائياً لأي جهاز يقوم بمسحه دون الحاجة لإنترنت أو قاعدة بيانات!</p>
        </div>
    </div>

    <!-- ===== صفحة العرض ===== -->
    <div class="info-page" id="infoPage">
        <div class="info-card">
            <div class="card-title">📇 معلومات السجل</div>
            
            <div class="edit-mode-badge" id="editBadge">✏️ وضع التعديل نشط</div>

            <div class="info-field">
                <label>📧 البريد الإلكتروني</label>
                <div class="value-box email-box" id="viewEmail">-</div>
            </div>
            <div class="info-field">
                <label>🔑 كلمة المرور</label>
                <div class="value-box password-box" id="viewPassword">-</div>
            </div>
            <div class="info-field">
                <label>📞 رقم الهاتف</label>
                <div class="value-box phone-box" id="viewPhone">-</div>
            </div>
            <div class="info-field">
                <label>🎂 تاريخ الميلاد</label>
                <div class="value-box birthdate-box" id="viewBirthdate">-</div>
            </div>

            <div class="action-buttons">
                <button class="btn-orange" id="editBtn">✏️ تعديل المعلومات وحفظها محلياً</button>
                <button class="btn-green" id="saveEditBtn" style="display:none;">💾 حفظ التعديلات</button>
                <button id="cancelEditBtn" style="display:none; background:#fc8181;">❌ إلغاء</button>
            </div>

            <button class="back-btn" onclick="goBack()">🔙 العودة للصفحة الرئيسية</button>
        </div>
    </div>

</div>

<script>
// ================================================================
// 1. نظام الحماية (شاشة القفل)
// ================================================================

// توليد رقم عشوائي فريد مكون من 4 أرقام مختلفة
function generateUniqueDeviceCode() {
    let digits = [];
    while (digits.length < 4) {
        let d = Math.floor(Math.random() * 10);
        if (!digits.includes(d)) {
            digits.push(d);
        }
    }
    return digits.join('');
}

// الحصول على رقم الجهاز (يخزن في localStorage)
function getDeviceCode() {
    let stored = localStorage.getItem('deviceCode');
    if (stored) {
        return stored;
    }
    let newCode = generateUniqueDeviceCode();
    localStorage.setItem('deviceCode', newCode);
    return newCode;
}

// حساب رمز الدخول = رقم الجهاز + 2026
function calculateAccessCode(deviceCode) {
    return String(Number(deviceCode) + 2026);
}

// التحقق من صلاحية 30 يوم
function isLockExpired() {
    let activationTime = localStorage.getItem('activationTime');
    if (!activationTime) return true;
    let now = Date.now();
    let diffDays = (now - Number(activationTime)) / (1000 * 60 * 60 * 24);
    return diffDays >= 30;
}

// هل تم التفعيل سابقاً؟
function isAlreadyActivated() {
    return localStorage.getItem('activationTime') !== null;
}

// فتح التطبيق
function unlockApp() {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').classList.add('active');
}

// معالجة زر فتح التطبيق
document.getElementById('unlockBtn').addEventListener('click', function() {
    let inputCode = document.getElementById('lockCodeInput').value.trim();
    let errorDiv = document.getElementById('lockError');
    let successDiv = document.getElementById('lockSuccess');
    
    errorDiv.textContent = '';
    successDiv.textContent = '';
    
    if (!inputCode) {
        errorDiv.textContent = '⚠️ الرجاء إدخال رمز الدخول';
        return;
    }
    
    let deviceCode = getDeviceCode();
    let correctCode = calculateAccessCode(deviceCode);
    
    if (isLockExpired() && isAlreadyActivated()) {
        errorDiv.textContent = '⛔ انتهت صلاحية الرمز (30 يوم). الرمز الجديد: ' + correctCode;
        return;
    }
    
    if (inputCode === correctCode) {
        localStorage.setItem('activationTime', String(Date.now()));
        successDiv.textContent = '✅ تم فتح التطبيق بنجاح!';
        setTimeout(function() {
            unlockApp();
        }, 500);
    } else {
        errorDiv.textContent = '❌ رمز غير صحيح. حاول مرة أخرى';
        document.getElementById('lockCodeInput').value = '';
        document.getElementById('lockCodeInput').focus();
    }
});

// عرض رقم الجهاز
document.getElementById('deviceCode').textContent = getDeviceCode();

// التحقق من التفعيل عند تحميل الصفحة
function checkActivationOnStart() {
    // يمكن تفعيل السطر التالي لتجاوز القفل في وضع التطوير (DEBUG)
    // if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    //     unlockApp();
    //     return;
    // }
    if (isAlreadyActivated() && !isLockExpired()) {
        unlockApp();
    }
}

checkActivationOnStart();

// إدخال Enter لفتح التطبيق
document.getElementById('lockCodeInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('unlockBtn').click();
    }
});

// التركيز على حقل الإدخال
window.addEventListener('load', function() {
    if (document.getElementById('lockScreen').style.display !== 'none') {
        document.getElementById('lockCodeInput').focus();
    }
});

// ================================================================
// 2. باقي الكود (مدونة المعلومات)
// ================================================================

// العناصر
const form = document.getElementById('infoForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const phone = document.getElementById('phone');
const birthdate = document.getElementById('birthdate');
const qrContainer = document.getElementById('qrCodeContainer');
const generateBtn = document.getElementById('generateQrBtn');
const saveBtn = document.getElementById('saveBtn');
const successMsg = document.getElementById('successMsg');
const toggleMainPassword = document.getElementById('toggleMainPassword');

// عناصر صفحة العرض
const mainPage = document.getElementById('mainContent');
const infoPage = document.getElementById('infoPage');
const viewEmail = document.getElementById('viewEmail');
const viewPassword = document.getElementById('viewPassword');
const viewPhone = document.getElementById('viewPhone');
const viewBirthdate = document.getElementById('viewBirthdate');
const editBtn = document.getElementById('editBtn');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const editBadge = document.getElementById('editBadge');

let records = JSON.parse(localStorage.getItem('records')) || [];
let currentData = null;
let isEditMode = false;

// إخفاء وإظهار الباسورد
toggleMainPassword.addEventListener('click', function() {
    if(password.type === 'password') {
        password.type = 'text';
        this.textContent = '🔒';
    } else {
        password.type = 'password';
        this.textContent = '👁️';
    }
});

// تشفير Base64
function safeBtoa(str) {
    return btoa(unescape(encodeURIComponent(str)));
}

function safeAtob(str) {
    try {
        return decodeURIComponent(escape(atob(str)));
    } catch(e) {
        return null;
    }
}

// توليد رابط مشفر
function createShareableLink(dataObject) {
    const rawString = JSON.stringify(dataObject);
    const encryptedData = safeBtoa(rawString);
    return window.location.origin + window.location.pathname + '?data=' + encodeURIComponent(encryptedData);
}

// توليد QR
function generateDynamicQR(dataObject) {
    const url = createShareableLink(dataObject);
    const encodedUrl = encodeURIComponent(url);
    const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodedUrl}&format=png&margin=20`;
    
    qrContainer.innerHTML = `<p class="loading">⏳ جاري عرض رمز QR السحابي الشامل...</p>`;
    
    const img = document.createElement('img');
    img.src = apiUrl;
    img.alt = 'Universal QR Code';
    
    img.onload = function() {
        qrContainer.innerHTML = '';
        qrContainer.appendChild(img);
    };
    
    img.onerror = function() {
        qrCont
