<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة بيانات الزبائن</title>
    <!-- مكتبة توليد الـ QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* حاوية النظام الرئيسية */
        #main-container {
            background-color: #12131a;
            border: 1px solid #1f222f;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 30px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #d4a359;
            font-size: 22px;
        }

        .form-group {
            text-align: right;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #9ca3af;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d3142;
            background-color: #1f222f;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:disabled {
            background-color: #0b0c10;
            color: #9ca3af;
            border-color: #1f222f;
            cursor: not-allowed;
        }

        input:focus:not(:disabled) {
            border-color: #d4a359;
        }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            background-color: #d4a359;
            color: #0b0c10;
        }

        /* حاوية الـ QR كود */
        #qrcode-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1f222f;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed #2d3142;
        }

        #qrcode {
            padding: 10px;
            background: #ffffff; /* خلفية بيضاء لسهولة مسح الباركود */
            border-radius: 8px;
        }

        .qr-text {
            margin-top: 10px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2>نظام إدارة بيانات الزبائن</h2>
        
        <div class="form-group">
            <label for="customerEmail">البريد الإلكتروني:</label>
            <input type="email" id="customerEmail" disabled>
        </div>

        <div class="form-group">
            <label for="customerPassword">كلمة المرور:</label>
            <input type="text" id="customerPassword" disabled>
        </div>

        <div class="form-group">
            <label for="customerPhone">رقم الهاتف:</label>
            <input type="tel" id="customerPhone" disabled>
        </div>

        <div class="form-group">
            <label for="customerDate">التاريخ:</label>
            <input type="date" id="customerDate" disabled>
        </div>

        <button id="editBtn" class="btn" onclick="toggleCustomerEdit()">تعديل المعلومات</button>

        <!-- منطقة عرض الباركود -->
        <div id="qrcode-container">
            <div id="qrcode"></div>
            <p class="qr-text">الـ QR Code المحدث للزبون</p>
        </div>
    </div>

    <script>
        let qrGeneratorInstance = null;

        // دالة مساعدة لتعطيل أو تفعيل الحقول
        function setFieldsDisabled(status) {
            document.getElementById('customerEmail').disabled = status;
            document.getElementById('customerPassword').disabled = status;
            document.getElementById('customerPhone').disabled = status;
            document.getElementById('customerDate').disabled = status;
        }

        // دالة تحديث وتوليد الـ QR Code بشكل صحيح
        function updateQRCode(textData) {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // مسح القديم
            
            // إنشاء باركود جديد
            new QRCode(qrContainer, {
                text: textData,
                width: 150,
                height: 150,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });
        }

        // عند فتح الصفحة: فحص الرابط وفك التشفير وعرض البيانات فوراً
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cdata = urlParams.get('cdata');

            if (cdata) {
                try {
                    // فك التشفير بشكل آمن يدعم اللغة العربية
                    const decodedData = decodeURIComponent(escape(atob(cdata)));
                    const customerData = JSON.parse(decodedData);

                    // تعبئة الحقول بالبيانات المستخرجة من الرابط
                    document.getElementById('customerEmail').value = customerData.email || '';
                    document.getElementById('customerPassword').value = customerData.password || '';
                    document.getElementById('customerPhone').value = customerData.phone || '';
                    document.getElementById('customerDate').value = customerData.date || '';

                    // توليد الـ QR للرابط الحالي
                    updateQRCode(window.location.href);
                } catch (e) {
                    console.error("خطأ في فك تشفير البيانات الممررة:", e);
                    alert("الرابط يحتوي على بيانات غير صالحة أو تالفة.");
                }
            } else {
                // إذا فتح الصفحة لأول مرة بدون بيانات، نفتح الحقول لإدخال بيانات جديدة
                setFieldsDisabled(false);
                const editBtn = document.getElementById('editBtn');
                editBtn.innerText = "توليد الرابط والـ QR الأول";
                editBtn.style.backgroundColor = "#13542b";
                editBtn.style.color = "#ffffff";
            }
        };

        // دالة زر "تعديل المعلومات" للتحويل بين القفل والتعديل والحفظ الثابت
        function toggleCustomerEdit() {
            const isCurrentlyDisabled = document.getElementById('customerEmail').disabled;
            const editBtn = document.getElementById('editBtn');

            if (isCurrentlyDisabled) {
                // فتح الحقول للتعديل
                setFieldsDisabled(false);
                editBtn.innerText = "حفظ التعديلات الجديدة";
                editBtn.style.backgroundColor = "#13542b";
                editBtn.style.color = "#ffffff";
            } else {
                // حفظ التعديلات وقفل الحقول
                const email = document.getElementById('customerEmail').value;
                const password = document.getElementById('customerPassword').value;
                const phone = document.getElementById('customerPhone').value;
                const date = document.getElementById('customerDate').value;

                if(!email || !password || !phone || !date) {
                    alert("لا يمكن ترك حقول فارغة أثناء التعديل.");
                    return;
                }

                setFieldsDisabled(true);
                editBtn.innerText = "تعديل المعلومات";
                editBtn.style.backgroundColor = "#d4a359";
                editBtn.style.color = "#0b0c10";

                // تحويل البيانات الجديدة وتشفيرها بشكل متوافق مع الحروف العربية
                const rawData = JSON.stringify({ email, password, phone, date });
                const encodedData = btoa(unescape(encodeURIComponent(rawData)));
                const currentUrl = window.location.href.split('?')[0];
                const newUrl = `${currentUrl}?cdata=${encodedData}`;
                
                // تحديث شريط المتصفح فوراً بالبيانات الجديدة
                window.history.replaceState({}, '', newUrl);

                // تحديث الـ QR كود بالرابط الجديد الحامل للتعديلات
                updateQRCode(newUrl);

                alert("تم تحديث معلوماتك وثباتها في الرابط بنجاح!");
            }
        }
    </script>

</body>
</html>
