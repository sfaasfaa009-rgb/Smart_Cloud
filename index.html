<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة المعلومات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1a202c; margin-bottom: 25px; font-size: 28px; }
        
        .lock-screen { display: block; text-align: center; }
        .lock-screen.hidden { display: none; }
        .lock-icon { font-size: 70px; margin: 20px 0; }
        .lock-screen h2 { color: #e53e3e; margin-bottom: 20px; }
        .random-number-box { background: #1a202c; color: #48bb78; font-size: 48px; font-weight: 900; letter-spacing: 15px; padding: 20px; border-radius: 15px; margin: 20px 0; font-family: 'Courier New', monospace; }
        .lock-screen .info-text { color: #4a5568; margin: 15px 0; line-height: 1.8; font-size: 15px; }
        .lock-screen .field { margin: 20px 0; }
        .lock-screen .field input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 22px; text-align: center; letter-spacing: 8px; font-weight: 700; background: #f7fafc; }
        .lock-screen button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .error-msg { color: #e53e3e; font-weight: 600; margin-top: 10px; display: none; }
        .error-msg.show { display: block; }
        .days-left { background: #c6f6d5; color: #22543d; padding: 8px 15px; border-radius: 20px; font-weight: 600; font-size: 13px; display: inline-block; margin-top: 10px; }
        
        .main-page { display: block; }
        .main-page.hidden { display: none; }
        .field { margin-bottom: 18px; position: relative; }
        .field label { display: block; font-weight: 600; margin-bottom: 6px; color: #2d3748; font-size: 14px; }
        .field input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #f7fafc; }
        .field input:focus { border-color: #667eea; outline: none; background: white; }
        .password-container { position: relative; }
        .toggle-password { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #718096; font-size: 18px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-pink { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-green { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }
        .btn-orange { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); }
        .qr-section-box { margin: 25px 0; padding: 20px; background: #f7fafc; border-radius: 16px; text-align: center; border: 2px dashed #cbd5e0; }
        .qr-code-container { display: flex; justify-content: center; align-items: center; margin: 10px 0; min-height: 200px; background: white; border-radius: 12px; padding: 15px; }
        .qr-code-container img { max-width: 100%; height: auto; border-radius: 8px; }
        .qr-note { color: #718096; font-size: 12px; margin-top: 10px; }
        .loading { color: #667eea; font-weight: 600; }
        
        .info-page { display: none; }
        .info-page.active { display: block; }
        .info-card { background: white; border-radius: 20px; padding: 35px; border: 3px solid #667eea; }
        .info-card .card-title { text-align: center; color: #1a202c; font-size: 24px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 3px solid #667eea; }
        .info-card .info-field { margin-bottom: 20px; }
        .info-card .info-field label { display: block; font-weight: 700; color: #4a5568; font-size: 14px; margin-bottom: 6px; }
        .info-card .info-field .value-box { padding: 14px 18px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; color: #2d3748; font-weight: 500; word-break: break-all; background: #f7fafc; }
        .email-box { border-color: #667eea; background: #ebf4ff; color: #2b6cb0; }
        .password-box { border-color: #9f7aea; background: #faf5ff; color: #6b46c1; }
        .phone-box { border-color: #48bb78; background: #f0fff4; color: #276749; }
        .birthdate-box { border-color: #ed8936; background: #fffaf0; color: #c05621; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .action-buttons button { flex: 1; min-width: 120px; }
        .back-btn { margin-top: 10px; background: #718096; }
        .edit-mode-badge { text-align: center; background: #fefcbf; color: #975a16; padding: 8px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; border: 2px solid #f6c23e; display: none; }
        .edit-mode-badge.active { display: block; }
        .success-msg { background: #c6f6d5; color: #22543d; padding: 10px; border-radius: 10px; margin-top: 10px; text-align: center; font-weight: 600; display: none; }
        .success-msg.show { display: block; }
        .editable { background: white; border-color: #e53e3e; border-width: 2px; }
        @media (max-width: 600px) { .container { padding: 18px; } .info-card { padding: 20px; } .random-number-box { font-size: 36px; letter-spacing: 8px; } }
    </style>
</head>
<body>

<div class="container">

    <!-- شاشة القفل -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-icon">🔒</div>
        <h2>التطبيق مقفل</h2>
        <div class="random-number-box" id="randomNumberDisplay">0000</div>
        <p class="info-text">📌 أرسل الرقم أعلاه لمدير النظام لتحصل على رمز الدخول</p>
        <div class="field"><input type="text" id="unlockCode" placeholder="أدخل رمز الدخول" maxlength="10"></div>
        <button id="unlockBtn">🔓 فتح</button>
        <div class="error-msg" id="errorMsg">❌ رمز غير صحيح</div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div class="main-page hidden" id="mainPage">
        <h1>📝 مدونة المعلومات</h1>
        <div style="text-align:center; margin-bottom:20px;"><span class="days-left">⏳ متبقي <span id="daysLeftTop">0</span> يوم</span></div>
        <form id="infoForm">
            <div class="field"><label>📧 البريد الإلكتروني</label><input type="email" id="email" placeholder="example@mail.com" required></div>
            <div class="field"><label>🔑 كلمة المرور</label><div class="password-container"><input type="password" id="password" placeholder="********" required><span class="toggle-password" id="toggleMainPassword">👁️</span></div></div>
            <div class="field"><label>📞 رقم الهاتف</label><input type="tel" id="phone" placeholder="05xxxxxxxx" required></div>
            <div class="field"><label>🎂 تاريخ الميلاد</label><input type="date" id="birthdate" required></div>
            <button type="submit">💾 حفظ المعلومات</button>
            <div class="success-msg" id="successMsg">✅ تم الحفظ بنجاح!</div>
        </form>
    </div>

</div>

<script>
const SECRET_KEY = 2026;
const LOCK_DURATION_DAYS = 30;

const lockScreen = document.getElementById('lockScreen');
const mainPage = document.getElementById('mainPage');
const randomNumberDisplay = document.getElementById('randomNumberDisplay');
const unlockCode = document.getElementById('unlockCode');
const unlockBtn = document.getElementById('unlockBtn');
const errorMsg = document.getElementById('errorMsg');
const daysLeftTop = document.getElementById('daysLeftTop');
const toggleMainPassword = document.getElementById('toggleMainPassword');

// توليد رقم عشوائي
function newRandomNumber() {
    return Math.floor(1000 + Math.random() * 9000);
}

// بداية التطبيق
function initApp() {
    let lockData = JSON.parse(localStorage.getItem('lockData'));
    const now = new Date().getTime();
    
    if (!lockData || now >= lockData.expiryTime) {
        // إنشاء قفل جديد
        const randomNum = newRandomNumber();
        lockData = {
            randomNumber: randomNum,
            expiryTime: now + (LOCK_DURATION_DAYS * 24 * 60 * 60 * 1000),
            isLocked: true
        };
        localStorage.setItem('lockData', JSON.stringify(lockData));
    }
    
    if (lockData.isLocked) {
        // عرض شاشة القفل
        randomNumberDisplay.textContent = lockData.randomNumber;
        lockScreen.classList.remove('hidden');
        mainPage.classList.add('hidden');
    } else {
        // عرض التطبيق
        const daysLeft = Math.ceil((lockData.expiryTime - now) / (1000 * 24 * 60 * 60));
        daysLeftTop.textContent = daysLeft;
        lockScreen.classList.add('hidden');
        mainPage.classList.remove('hidden');
    }
}

// زر فتح القفل
unlockBtn.addEventListener('click', function() {
    const lockData = JSON.parse(localStorage.getItem('lockData'));
    const userCode = parseInt(unlockCode.value.trim());
    const correctCode = lockData.randomNumber + SECRET_KEY;
    
    if (userCode === correctCode) {
        lockData.isLocked = false;
        localStorage.setItem('lockData', JSON.stringify(lockData));
        lockScreen.classList.add('hidden');
        mainPage.classList.remove('hidden');
        daysLeftTop.textContent = LOCK_DURATION_DAYS;
        errorMsg.classList.remove('show');
    } else {
        errorMsg.classList.add('show');
        setTimeout(() => errorMsg.classList.remove('show'), 3000);
    }
    unlockCode.value = '';
});

// إظهار/إخفاء كلمة المرور
toggleMainPassword.addEventListener('click', function() {
    const passField = document.getElementById('password');
    if(passField.type === 'password') {
        passField.type = 'text';
        this.textContent = '🔒';
    } else {
        passField.type = 'password';
        this.textContent = '👁️';
    }
});

// حفظ النموذج
document.getElementById('infoForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const successMsg = document.getElementById('successMsg');
    successMsg.classList.add('show');
    setTimeout(() => successMsg.classList.remove('show'), 3000);
    this.reset();
});

// بدء التطبيق
initApp();
</script>

</body>
</html>
