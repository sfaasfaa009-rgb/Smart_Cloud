<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النسخة التجارية - نظام إدارة الاشتراكات</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2, h3 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        /* شاشة قفل الاشتراك */
        #activationSection {
            text-align: center;
        }
        .lock-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        /* نظام الحقول */
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        input:disabled {
            background-color: #e9ecef;
            color: #333;
            font-weight: bold;
        }
        .buttons-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
            text-align: center;
            text-decoration: none;
        }
        .btn-activate { background-color: #ffc107; color: #333; }
        .btn-activate:hover { background-color: #e0a800; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-save:hover { background-color: #218838; }
        .btn-qr { background-color: #17a2b8; color: white; }
        .btn-qr:hover { background-color: #138496; }
        .btn-qr:disabled { background-color: #6c757d; opacity: 0.6; cursor: not-allowed; }
        .btn-edit { background-color: #007bff; color: white; }
        .btn-edit:hover { background-color: #0069d9; }
        
        /* أزرار المشاركة الجديدة للزبون */
        .btn-download { background-color: #6f42c1; color: white; }
        .btn-download:hover { background-color: #5a32a3; }
        .btn-whatsapp { background-color: #25d366; color: white; }
        .btn-whatsapp:hover { background-color: #20ba5a; }

        .qr-section {
            margin-top: 25px;
            text-align: center;
            display: none;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        .share-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- 🔐 أولاً: شاشة قفل الاشتراك (تظهر أولاً) -->
    <div id="activationSection">
        <div class="lock-icon">🔐</div>
        <h3>نظام توليد الباركود الذكي</h3>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">عذراً، يجب إدخال كود التفعيل لتتمكن من استخدام الخدمة.</p>
        <div class="form-group">
            <input type="text" id="activationKey" placeholder="أدخل كود الاشتراك الشهري هنا" style="text-align: center; font-weight: bold;">
        </div>
        <button type="button" id="activateBtn" class="btn btn-activate">تفعيل الحساب الآن</button>
    </div>

    <!-- 📱 ثانياً: واجهة العمل الأساسية للمحل (تكون مخفية وتفتح بعد التفعيل) -->
    <div id="mainAppSection" style="display: none;">
        <h2 style="font-size: 18px; color: #28a745;">✅ الحساب نشط وجاهز</h2>
        
        <form id="infoForm">
            <div class="form-group">
                <label for="email">البريد الإلكتروني (Email)</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور (Password)</label>
                <input type="text" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="phone">رقم الهاتف (Phone Number)</label>
                <input type="tel" id="phone" placeholder="07xxxxxxxx" required>
            </div>
            <div class="form-group">
                <label for="birthdate">تاريخ الميلاد (Birthdate)</label>
                <input type="date" id="birthdate" required>
            </div>

            <div class="buttons-stack">
                <button type="submit" id="saveBtn" class="btn btn-save">حفظ بيانات الزبون</button>
                <button type="button" id="editBtn" class="btn btn-edit" style="display: none;">تعديل المعلومات</button>
                <button type="button" id="generateQrBtn" class="btn btn-qr" disabled>إنشاء باركود QR للزبون</button>
            </div>
        </form>

        <div id="qrSection" class="qr-section">
            <p style="color: #28a745; font-size: 14px; font-weight: bold;">تم إنشاء الباركود الخاص بالزبون بنجاح!</p>
            
            <!-- مكان ظهور الباركود -->
            <div id="qrcode"></div>
            
            <!-- أزرار الإرسال والمشاركة السريعة للزبون -->
            <div class="share-box">
                <button type="button" id="downloadQrBtn" class="btn btn-download">📥 تحميل كصورة في الهاتف</button>
                <a id="whatsappBtn" href="#" target="_blank" class="btn btn-whatsapp">💬 إرسال الكود عبر الواتساب للزبون</a>
            </div>
        </div>
    </div>
</div>

<!-- مكتبة توليد الـ QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    // قائمة الأكواد المفعلة المسموح لها بالدخول (يمكنك تعديلها أو إضافة غيرها هنا)
    const validKeys = ["VIP-MONTH-2026", "SHOP-FREE-TEST"];

    const activationSection = document.getElementById('activationSection');
    const mainAppSection = document.getElementById('mainAppSection');
    const activationKeyInput = document.getElementById('activationKey');
    const activateBtn = document.getElementById('activateBtn');

    const form = document.getElementById('infoForm');
    const inputs = form.querySelectorAll('input');
    const saveBtn = document.getElementById('saveBtn');
    const editBtn = document.getElementById('editBtn');
    const generateQrBtn = document.getElementById('generateQrBtn');
    const qrSection = document.getElementById('qrSection');
    const qrcodeDiv = document.getElementById('qrcode');
    
    const downloadQrBtn = document.getElementById('downloadQrBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');

    let generatedUrl = "";

    // 🔐 فحص كود التفعيل عند الضغط على زر التفعيل
    activateBtn.addEventListener('click', () => {
        const userKey = activationKeyInput.value.trim();
        
        if (validKeys.includes(userKey)) {
            alert("تم تفعيل حسابك بنجاح! تم فتح الصلاحية لمدة شهر.");
            activationSection.style.display = 'none'; // إخفاء شاشة القفل
            mainAppSection.style.display = 'block';   // إظهار البرنامج
        } else {
            alert("❌ كود التفعيل غير صحيح أو منتهي الصلاحية! يرجى التواصل مع الإدارة للتجديد.");
        }
    });

    // جلب البيانات تلقائياً إذا فتح الزبون الباركود الخاص به (يتخطى شاشة القفل لأن هذا زبون يستعرض بياناته فقط)
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('e');
        if (emailParam) {
            // إذا كان الرابط يحتوي على بيانات زبون، نفتحه مباشرة للعرض دون قفل اشتراك المحل
            activationSection.style.display = 'none';
            mainAppSection.style.display = 'block';
            
            document.getElementById('email').value = atob(emailParam);
            document.getElementById('password').value = atob(urlParams.get('p'));
            document.getElementById('phone').value = atob(urlParams.get('ph'));
            document.getElementById('birthdate').value = urlParams.get('d');

            inputs.forEach(input => input.disabled = true);
            saveBtn.style.display = 'none';
            generateQrBtn.style.display = 'none';
        }
    });

    // عند الضغط على زر "حفظ بيانات الزبون"
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const birthdate = document.getElementById('birthdate').value;

        const encEmail = btoa(email);
        const encPass = btoa(password);
        const encPhone = btoa(phone);

        generatedUrl = window.location.origin + window.location.pathname + `?e=${encEmail}&p=${encPass}&ph=${encPhone}&d=${birthdate}`;

        inputs.forEach(input => input.disabled = true);
        saveBtn.style.display = 'none';
        editBtn.style.display = 'block';
        generateQrBtn.disabled = false;
    });

    // عند الضغط على زر "إنشاء باركود QR"
    generateQrBtn.addEventListener('click', function() {
        if (!generatedUrl) return;

        qrcodeDiv.innerHTML = ""; 
        
        // توليد الـ QR داخل الصفحة
        new QRCode(qrcodeDiv, {
            text: generatedUrl,
            width: 180,
            height: 180
        });

        // تجهيز زر الواتساب لإرسال الرابط مباشرة للزبون
        whatsappBtn.href = `https://api.whatsapp.com/send?text=مرحباً، هذا هو رابط باركود حساباتك الآمن للوصول إليها في أي وقت: ${encodeURIComponent(generatedUrl)}`;

        qrSection.style.display = 'block';
    });

    // ميزة تحميل الباركود كصورة مستقلة في الاستوديو فوراً بضغطة زر واحدة
    downloadQrBtn.addEventListener('click', function() {
        const qrImg = qrcodeDiv.querySelector('img');
        if (qrImg) {
            const downloadLink = document.createElement('a');
            downloadLink.href = qrImg.src;
            downloadLink.download = 'customer_qr_code.png';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        } else {
            alert("يرجى إنشاء الباركود أولاً قبل التحميل.");
        }
    });

    // عند الضغط على زر التعديل
    editBtn.addEventListener('click', function() {
        inputs.forEach(input => input.disabled = false);
        editBtn.style.display = 'none';
        saveBtn.style.display = 'block';
        generateQrBtn.disabled = true; 
        qrSection.style.display = 'none'; 
    });
</script>

</body>
</html>
