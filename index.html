<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة المعلومات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 28px;
        }

        /* ======== الصفحة الرئيسية ======== */
        .main-page {
            display: block;
        }

        .main-page.hidden {
            display: none;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 14px;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f7fafc;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .field input[type="password"] {
            -webkit-text-security: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-pink:hover {
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        #qrSection {
            margin: 25px 0;
            padding: 20px;
            background: #f7fafc;
            border-radius: 16px;
            text-align: center;
            border: 2px dashed #cbd5e0;
        }

        #qrCodeContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            min-height: 200px;
            background: white;
            border-radius: 12px;
            padding: 15px;
        }

        #qrCodeContainer img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        #recordsList {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .record-item {
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border-right: 5px solid #667eea;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .record-item .data {
            font-size: 13px;
            color: #2d3748;
            word-break: break-all;
            flex: 1;
        }

        .record-item .delete-btn {
            background: #fc8181;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            width: auto;
            margin: 0;
        }

        .record-item .delete-btn:hover {
            background: #e53e3e;
        }

        hr {
            margin: 20px 0;
            border: 1px dashed #e2e8f0;
        }

        .qr-note {
            color: #718096;
            font-size: 12px;
            margin-top: 10px;
        }

        .loading {
            color: #667eea;
            font-weight: 600;
        }

        /* ======== صفحة عرض المعلومات (عند مسح QR) ======== */
        .info-page {
            display: none;
        }

        .info-page.active {
            display: block;
        }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            border: 3px solid #667eea;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
        }

        .info-card .card-title {
            text-align: center;
            color: #1a202c;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .info-card .info-field {
            margin-bottom: 20px;
        }

        .info-card .info-field label {
            display: block;
            font-weight: 700;
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .info-card .info-field .value-box {
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            color: #2d3748;
            font-weight: 500;
            word-break: break-all;
            background: #f7fafc;
        }

        .info-card .info-field .value-box.email-box {
            border-color: #667eea;
            background: #ebf4ff;
            color: #2b6cb0;
        }

        .info-card .info-field .value-box.password-box {
            border-color: #9f7aea;
            background: #faf5ff;
            color: #6b46c1;
        }

        .info-card .info-field .value-box.phone-box {
            border-color: #48bb78;
            background: #f0fff4;
            color: #276749;
        }

        .info-card .info-field .value-box.birthdate-box {
            border-color: #ed8936;
            background: #fffaf0;
            color: #c05621;
        }

        .info-card .back-btn {
            margin-top: 20px;
            background: #718096;
        }

        .info-card .back-btn:hover {
            background: #4a5568;
        }

        @media (max-width: 600px) {
            .container {
                padding: 18px;
            }
            .info-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ======== الصفحة الرئيسية ======== -->
    <div class="main-page" id="mainPage">
        <h1>📝 مدونة المعلومات</h1>
        
        <form id="infoForm">
            <div class="field">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="field">
                <label>🔑 كلمة المرور</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <div class="field">
                <label>📞 رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
            </div>
            <div class="field">
                <label>🎂 تاريخ الميلاد</label>
                <input type="date" id="birthdate" required>
            </div>
            <button type="submit">💾 حفظ المعلومات</button>
        </form>

        <div id="qrSection">
            <h3>📱 رمز QR</h3>
            <div id="qrCodeContainer">
                <p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>
            </div>
            <button class="btn-pink" id="generateQrBtn">🔄 إنشاء QR جديد</button>
            <p class="qr-note">📸 صوّر الكود بأي هاتف وستفتح صفحة تعرض المعلومات بشكل جميل</p>
        </div>

        <hr>

        <h3>📋 السجلات المحفوظة</h3>
        <div id="recordsList"></div>
    </div>

    <!-- ======== صفحة عرض المعلومات (تظهر عند مسح QR) ======== -->
    <div class="info-page" id="infoPage">
        <div class="info-card">
            <div class="card-title">📇 معلومات السجل</div>
            <div class="info-field">
                <label>📧 البريد الإلكتروني</label>
                <div class="value-box email-box" id="viewEmail">-</div>
            </div>
            <div class="info-field">
                <label>🔑 كلمة المرور</label>
                <div class="value-box password-box" id="viewPassword">-</div>
            </div>
            <div class="info-field">
                <label>📞 رقم الهاتف</label>
                <div class="value-box phone-box" id="viewPhone">-</div>
            </div>
            <div class="info-field">
                <label>🎂 تاريخ الميلاد</label>
                <div class="value-box birthdate-box" id="viewBirthdate">-</div>
            </div>
            <button class="back-btn" onclick="goBack()">🔙 العودة للصفحة الرئيسية</button>
        </div>
    </div>

</div>

<script>
// ======== العناصر ========
const form = document.getElementById('infoForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const phone = document.getElementById('phone');
const birthdate = document.getElementById('birthdate');
const qrContainer = document.getElementById('qrCodeContainer');
const generateBtn = document.getElementById('generateQrBtn');
const recordsList = document.getElementById('recordsList');
const mainPage = document.getElementById('mainPage');
const infoPage = document.getElementById('infoPage');

// عناصر صفحة العرض
const viewEmail = document.getElementById('viewEmail');
const viewPassword = document.getElementById('viewPassword');
const viewPhone = document.getElementById('viewPhone');
const viewBirthdate = document.getElementById('viewBirthdate');

let records = JSON.parse(localStorage.getItem('records')) || [];

// ======== إنشاء رابط للمشاركة ========
function createShareableLink(data) {
    const encoded = encodeURIComponent(JSON.stringify(data));
    return window.location.origin + window.location.pathname + '?data=' + encoded;
}

// ======== توليد QR Code ========
function generateQR(data) {
    const url = createShareableLink(data);
    const encodedUrl = encodeURIComponent(url);
    const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodedUrl}&format=png&margin=20`;
    
    qrContainer.innerHTML = `<p class="loading">⏳ جاري إنشاء QR...</p>`;
    
    const img = document.createElement('img');
    img.src = apiUrl;
    img.alt = 'QR Code';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    
    img.onload = function() {
        qrContainer.innerHTML = '';
        qrContainer.appendChild(img);
    };
    
    img.onerror = function() {
        qrContainer.innerHTML = '<p style="color:#e53e3e;">⚠️ حدث خطأ، حاول مرة أخرى</p>';
    };
}

// ======== عرض السجلات ========
function showRecords() {
    if (records.length === 0) {
        recordsList.innerHTML = '<p style="color:#a0aec0; text-align:center;">📭 لا توجد سجلات</p>';
        return;
    }
    recordsList.innerHTML = records.map((rec, i) => `
        <div class="record-item">
            <span class="data">📧 ${rec.email} | 🔑 ${rec.password} | 📞 ${rec.phone} | 🎂 ${rec.birthdate}</span>
            <button class="delete-btn" onclick="deleteRecord(${i})">✖</button>
        </div>
    `).join('');
}

// ======== حفظ ========
form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    if (!email.value || !password.value || !phone.value || !birthdate.value) {
        alert('⚠️ املأ جميع الحقول');
        return;
    }
    
    const data = {
        email: email.value,
        password: password.value,
        phone: phone.value,
        birthdate: birthdate.value
    };
    
    records.push(data);
    localStorage.setItem('records', JSON.stringify(records));
    showRecords();
    generateQR(data);
    form.reset();
    
    const btn = form.querySelector('button[type="submit"]');
    btn.textContent = '✅ تم الحفظ!';
    setTimeout(() => btn.textContent = '💾 حفظ المعلومات', 2000);
});

// ======== زر توليد QR ========
generateBtn.addEventListener('click', function() {
    if (records.length === 0) {
        alert('⚠️ لا توجد سجلات');
        return;
    }
    const last = records[records.length - 1];
    generateQR(last);
    this.textContent = '✅ تم!';
    setTimeout(() => this.textContent = '🔄 إنشاء QR جديد', 2000);
});

// ======== حذف ========
function deleteRecord(index) {
    if (confirm('🗑️ تأكد من الحذف؟')) {
        records.splice(index, 1);
        localStorage.setItem('records', JSON.stringify(records));
        showRecords();
        if (records.length > 0) {
            generateQR(records[records.length - 1]);
        } else {
            qrContainer.innerHTML = '<p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>';
        }
    }
}

// ======== العودة للصفحة الرئيسية ========
function goBack() {
    infoPage.classList.remove('active');
    mainPage.style.display = 'block';
    window.history.pushState({}, '', window.location.pathname);
}

// ======== قراءة البيانات من الرابط ========
function loadDataFromURL() {
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');
    
    if (dataParam) {
        try {
            const data = JSON.parse(decodeURIComponent(dataParam));
            
            // إخفاء الصفحة الرئيسية وإظهار صفحة المعلومات
            mainPage.style.display = 'none';
            infoPage.classList.add('active');
            
            // عرض البيانات
            viewEmail.textContent = data.email;
            viewPassword.textContent = data.password;
            viewPhone.textContent = data.phone;
            viewBirthdate.textContent = data.birthdate;
            
            return true;
        } catch(e) {
            console.error('خطأ في قراءة البيانات:', e);
        }
    }
    return false;
}

// ======== بدء التطبيق ========
const isInfoView = loadDataFromURL();

if (!isInfoView) {
    showRecords();
    if (records.length > 0) {
        generateQR(records[0]);
    }
}

console.log('✅ التطبيق يعمل بنجاح!');
</script>

</body>
</html>
