<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة المعلومات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1a202c; margin-bottom: 25px; font-size: 28px; }
        .main-page { display: block; }
        .field { margin-bottom: 18px; position: relative; }
        .field label { display: block; font-weight: 600; margin-bottom: 6px; color: #2d3748; font-size: 14px; }
        .field input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #f7fafc; transition: 0.3s; }
        .field input:focus { border-color: #667eea; outline: none; background: white; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); }
        .password-container { position: relative; }
        .toggle-password { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #718096; font-size: 18px; user-select: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .btn-pink { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-pink:hover { box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4); }
        .btn-green { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }
        .btn-green:hover { box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4); }
        .btn-orange { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); }
        .btn-orange:hover { box-shadow: 0 8px 20px rgba(237, 137, 54, 0.4); }
        .qr-section-box { margin: 25px 0; padding: 20px; background: #f7fafc; border-radius: 16px; text-align: center; border: 2px dashed #cbd5e0; }
        .qr-code-container { display: flex; justify-content: center; align-items: center; margin: 10px 0; min-height: 200px; background: white; border-radius: 12px; padding: 15px; }
        .qr-code-container img { max-width: 100%; height: auto; border-radius: 8px; }
        .qr-note { color: #718096; font-size: 12px; margin-top: 10px; }
        .loading { color: #667eea; font-weight: 600; }
        .info-page { display: none; }
        .info-page.active { display: block; }
        .info-card { background: white; border-radius: 20px; padding: 35px; border: 3px solid #667eea; box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2); }
        .info-card .card-title { text-align: center; color: #1a202c; font-size: 24px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 3px solid #667eea; }
        .info-card .info-field { margin-bottom: 20px; }
        .info-card .info-field label { display: block; font-weight: 700; color: #4a5568; font-size: 14px; margin-bottom: 6px; }
        .info-card .info-field .value-box { padding: 14px 18px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; color: #2d3748; font-weight: 500; word-break: break-all; background: #f7fafc; transition: 0.3s; }
        .info-card .info-field .value-box.email-box { border-color: #667eea; background: #ebf4ff; color: #2b6cb0; }
        .info-card .info-field .value-box.password-box { border-color: #9f7aea; background: #faf5ff; color: #6b46c1; }
        .info-card .info-field .value-box.phone-box { border-color: #48bb78; background: #f0fff4; color: #276749; }
        .info-card .info-field .value-box.birthdate-box { border-color: #ed8936; background: #fffaf0; color: #c05621; }
        .info-card .info-field .value-box.editable { background: white; border-color: #e53e3e; border-width: 2px; box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.2); }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .action-buttons button { flex: 1; min-width: 120px; }
        .back-btn { margin-top: 10px; background: #718096; }
        .edit-mode-badge { text-align: center; background: #fefcbf; color: #975a16; padding: 8px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; border: 2px solid #f6c23e; display: none; }
        .edit-mode-badge.active { display: block; }
        .success-msg { background: #c6f6d5; color: #22543d; padding: 10px; border-radius: 10px; margin-top: 10px; text-align: center; font-weight: 600; display: none; }
        .success-msg.show { display: block; }
        
        .security-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .security-box { background: white; padding: 30px; border-radius: 20px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .security-code-display { font-size: 36px; font-weight: 800; letter-spacing: 3px; color: #e53e3e; margin: 15px 0; padding: 10px; background: #fff5f5; border: 2px dashed #feb2b2; border-radius: 10px; }
        .security-box p { color: #4a5568; font-size: 15px; line-height: 1.6; }
        .security-input-field { width: 100%; padding: 14px; border: 2px solid #cbd5e0; border-radius: 12px; font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 12px; background: #f7fafc; }
        .security-input-field:focus { border-color: #667eea; outline: none; background: white; }
        .error-security-msg { color: #e53e3e; font-weight: 600; font-size: 14px; margin-bottom: 12px; display: none; }
        @media (max-width: 600px) { .container { padding: 18px; } .info-card { padding: 20px; } .action-buttons { flex-direction: column; } .action-buttons button { min-width: auto; } }
    </style>
</head>
<body>

<!-- نافذة قفل الحماية وتأكيد الرمز -->
<div id="securityModal" class="security-overlay" style="display: none;">
    <div class="security-box">
        <h2>🔐 نظام تفعيل الخدمة</h2>
        <p style="margin-top: 10px;">يرجى تزويد صاحب الموقع بـ <b>"رقم الطلب"</b> الظاهر في الأسفل ليعطيك رمز الدخول الخاص بك:</p>
        <div id="securityCodeDisplay" class="security-code-display">0000</div>
        
        <input type="number" id="securityInputField" class="security-input-field" placeholder="أدخل رمز الدخول هنا" pattern="[0-9]*" inputmode="numeric">
        <div id="securityErrorMsg" class="error-security-msg">⚠️ رمز الدخول غير صحيح! تأكد من القيمة.</div>
        
        <button id="closeSecurityBtn" class="btn-green">🔑 تفعيل ودخول للموقع</button>
    </div>
</div>

<div class="container">
    <div class="main-page" id="mainPage">
        <h1>📝 مدونة المعلومات</h1>
        <form id="infoForm">
            <div class="field">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="field">
                <label>🔑 كلمة المرور</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="********" required>
                    <span class="toggle-password" id="toggleMainPassword">👁️</span>
                </div>
            </div>
            <div class="field">
                <label>📞 رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
            </div>
            <div class="field">
                <label>🎂 تاريخ الميلاد</label>
                <input type="date" id="birthdate" required>
            </div>
            <button type="submit" id="saveBtn">💾 حفظ المعلومات</button>
            <div class="success-msg" id="successMsg">✅ تم حفظ المعلومات بنجاح!</div>
        </form>

        <div class="qr-section-box" id="qrSection">
            <h3>📱 رمز QR الثابت والدائم</h3>
            <div class="qr-code-container" id="qrCodeContainer">
                <p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>
            </div>
            <button class="btn-pink" id="generateQrBtn">🔄 عرض كود QR للحساب الحالي</button>
        </div>
    </div>

    <div class="info-page" id="infoPage">
        <div class="info-card">
            <div class="card-title">📇 معلومات السجل</div>
            <div class="edit-mode-badge" id="editBadge">✏️ وضع التعديل نشط</div>
            <div class="info-field"><label>📧 البريد الإلكتروني</label><div class="value-box email-box" id="viewEmail">-</div></div>
            <div class="info-field"><label>🔑 كلمة المرور</label><div class="value-box password-box" id="viewPassword">-</div></div>
            <div class="info-field"><label>📞 رقم الهاتف</label><div class="value-box phone-box" id="viewPhone">-</div></div>
            <div class="info-field"><label>🎂 تاريخ الميلاد</label><div class="value-box birthdate-box" id="viewBirthdate">-</div></div>
            <div class="action-buttons">
                <button class="btn-orange" id="editBtn">✏️ تعديل المعلومات</button>
                <button class="btn-green" id="saveEditBtn" style="display:none;">💾 حفظ التعديلات</button>
                <button id="cancelEditBtn" style="display:none; background:#fc8181;">❌ إلغاء</button>
            </div>
            <button class="back-btn" onclick="goBack()">🔙 العودة الرئيسية</button>
        </div>
    </div>
</div>

<script>
const form = document.getElementById('infoForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const phone = document.getElementById('phone');
const birthdate = document.getElementById('birthdate');
const qrContainer = document.getElementById('qrCodeContainer');
const generateBtn = document.getElementById('generateQrBtn');
const saveBtn = document.getElementById('saveBtn');
const successMsg = document.getElementById('successMsg');
const toggleMainPassword = document.getElementById('toggleMainPassword');
const mainPage = document.getElementById('mainPage');
const infoPage = document.getElementById('infoPage');
const viewEmail = document.getElementById('viewEmail');
const viewPassword = document.getElementById('viewPassword');
const viewPhone = document.getElementById('viewPhone');
const viewBirthdate = document.getElementById('viewBirthdate');
const editBtn = document.getElementById('editBtn');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const editBadge = document.getElementById('editBadge');

const securityModal = document.getElementById('securityModal');
const securityCodeDisplay = document.getElementById('securityCodeDisplay');
const securityInputField = document.getElementById('securityInputField');
const securityErrorMsg = document.getElementById('securityErrorMsg');
const closeSecurityBtn = document.getElementById('closeSecurityBtn');

let records = JSON.parse(localStorage.getItem('records')) || [];
let currentData = null;
let isEditMode = false;

function get30DayRequestCode() {
    const periodIndex = Math.floor(Math.floor(Date.now() / 86400000) / 30);
    let seed = periodIndex + 12345;
    let x = Math.sin(seed) * 10000;
    return (Math.floor((x - Math.floor(x)) * 8999) + 1000);
}

// فحص الحماية المحدث (يتخطى الفحص تلقائياً إذا كان الرابط مخصصاً للزبون ومحتوياً على بيانات مشفرة)
function checkSecurityBarrier() {
    const params = new URLSearchParams(window.location.search);
    const hasDataParam = params.has('data'); // هل الرابط يحتوي على بيانات مشفرة للـ QR؟

    // إذا كان الرابط مخصصاً لعرض السجل (رابط الـ QR)، لا نطالب برمز الحماية ونسمح بالدخول فوراً للزبون
    if (hasDataParam) {
        securityModal.style.display = 'none';
        return; 
    }

    // إذا لم يكن رابط QR (المستخدم يحاول فتح الواجهة الرئيسية)، نطلب رمز الحماية
    const requestCode = get30DayRequestCode();
    const correctActivationCode = requestCode + 2026;
    const currentPeriodKey = "unlocked_period_" + Math.floor(Math.floor(Date.now() / 86400000) / 30);

    if (localStorage.getItem('site_security_lock') !== currentPeriodKey) {
        securityCodeDisplay.textContent = requestCode;
        securityModal.style.display = 'flex';
        
        closeSecurityBtn.onclick = function() {
            const userEnteredCode = parseInt(securityInputField.value.trim());
            if (userEnteredCode === correctActivationCode) {
                localStorage.setItem('site_security_lock', currentPeriodKey);
                securityModal.style.display = 'none';
                securityErrorMsg.style.display = 'none';
                securityInputField.value = '';
            } else {
                securityErrorMsg.style.display = 'block';
            }
        };
    }
}

toggleMainPassword.addEventListener('click', function() {
    if(password.type === 'password') { password.type = 'text'; this.textContent = '🔒'; }
    else { password.type = 'password'; this.textContent = '👁️'; }
});

function safeBtoa(str) { return btoa(unescape(encodeURIComponent(str))); }
function safeAtob(str) { try { return decodeURIComponent(escape(atob(str))); } catch(e) { return null; } }

function createShareableLink(dataObject) {
    return window.location.origin + window.location.pathname + '?data=' + encodeURIComponent(safeBtoa(JSON.stringify(dataObject)));
}

function generateDynamicQR(dataObject) {
    const apiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' + encodeURIComponent(createShareableLink(dataObject)) + '&format=png&margin=20';
    qrContainer.innerHTML = '<p class="loading">⏳ جاري عرض رمز QR...</p>';
    const img = document.createElement('img');
    img.src = apiUrl;
    img.onload = function() { qrContainer.innerHTML = ''; qrContainer.appendChild(img); };
    img.onerror = function() { qrContainer.innerHTML = '<p style="color:#e53e3e;">⚠️ حدث خطأ في الشبكة</p>'; };
}

form.addEventListener('submit', function(e) {
    e.preventDefault();
    const data = { email: email.value.trim(), password: password.value, phone: phone.value.trim(), birthdate: birthdate.value };
    records = records.filter(r => r.email !== data.email);
    records.push(data);
    localStorage.setItem('records', JSON.stringify(records));
    generateDynamicQR(data);
    successMsg.classList.add('show');
    setTimeout(() => successMsg.classList.remove('show'), 3000);
    saveBtn.textContent = '✅ تم الحفظ!';
    setTimeout(() => saveBtn.textContent = '💾 حفظ المعلومات', 2000);
    form.reset();
});

generateBtn.addEventListener('click', function() {
    if (records.length === 0) { alert('⚠️ لا توجد سجلات محفوظة حالياً.'); return; }
    generateDynamicQR(records[records.length - 1]);
});

function enableEditMode() {
    isEditMode = true;
    editBadge.classList.add('active');
    viewPassword.contentEditable = viewPhone.contentEditable = viewBirthdate.contentEditable = 'true';
    viewPassword.classList.add('editable'); viewPhone.classList.add('editable'); viewBirthdate.classList.add('editable');
    viewPassword.textContent = currentData.password;
    editBtn.style.display = 'none';
    saveEditBtn.style.display = cancelEditBtn.style.display = 'block';
}

function disableEditMode() {
    isEditMode = false;
    editBadge.classList.remove('active');
    viewPassword.contentEditable = viewPhone.contentEditable = viewBirthdate.contentEditable = 'false';
    viewPassword.classList.remove('editable'); viewPhone.classList.remove('editable'); viewBirthdate.classList.remove('editable');
    renderProtectedData();
    editBtn.style.display = 'block';
    saveEditBtn.style.display = cancelEditBtn.style.display = 'none';
}

function renderProtectedData() {
    if (currentData) {
        viewEmail.textContent = currentData.email;
        viewPhone.textContent = currentData.phone;
        viewBirthdate.textContent = currentData.birthdate;
        viewPassword.innerHTML = '•••••••• <span id="viewPassEye" style="cursor:pointer;margin-right:15px;font-size:14px;">👁️ إظهار</span>';
        document.getElementById('viewPassEye').addEventListener('click', function(e) {
            e.stopPropagation();
            if(viewPassword.textContent.includes('👁️')) {
                viewPassword.innerHTML = currentData.password + ' <span id="viewPassEye" style="cursor:pointer;margin-right:15px;font-size:14px;">🔒 إخفاء</span>';
                document.getElementById('viewPassEye').addEventListener('click', function(ev) { ev.stopPropagation(); renderProtectedData(); });
            } else { renderProtectedData(); }
        });
    }
}

editBtn.addEventListener('click', enableEditMode);
cancelEditBtn.addEventListener('click', disableEditMode);

saveEditBtn.addEventListener('click', function() {
    const newData = { email: viewEmail.textContent.trim(), password: viewPassword.textContent.replace(' 🔒 إخفاء', '').trim(), phone: viewPhone.textContent.trim(), birthdate: viewBirthdate.textContent.trim() };
    if (!newData.password || !newData.phone || !newData.birthdate) { alert('⚠️ الحقول فارغة'); return; }
    let index = records.findIndex(r => r.email === newData.email);
    if (index !== -1) records[index] = newData; else records.push(newData);
    localStorage.setItem('records', JSON.stringify(records));
    currentData = newData;
    disableEditMode();
    alert('✅ تم التعديل! أعد توليد QR لإعطائه للزبون.');
});

function goBack() { infoPage.classList.remove('active'); mainPage.style.display = 'block'; window.history.pushState({}, '', window.location.pathname); disableEditMode(); }

function loadDataFromURL() {
    const params = new URLSearchParams(window.location.search);
    const encryptedData = params.get('data');
    if (encryptedData) {
        const decryptedString = safeAtob(decodeURIComponent(encryptedData));
        if (decryptedString) {
            try {
                currentData = JSON.parse(decryptedString);
                mainPage.style.display = 'none'; infoPage.classList.add('active');
                renderProtectedData(); disableEditMode(); return true;
            } catch (err) { alert('⚠️ الرابط تالف.'); }
        }
    }
    return false;
}

// تشغيل نظام الحماية بذكاء أولاً
checkSecurityBarrier();
if (!loadDataFromURL() && records.length > 0) generateDynamicQR(records[records.length - 1]);
</script>
</body>
</html>
