<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة المعلومات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 28px;
        }

        /* ======== الصفحة الرئيسية ======== */
        .main-page {
            display: block;
        }

        .main-page.hidden {
            display: none;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 14px;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f7fafc;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .field input[type="password"] {
            -webkit-text-security: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-pink:hover {
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-green {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }

        .btn-green:hover {
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.4);
        }

        .btn-orange {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }

        .btn-orange:hover {
            box-shadow: 0 8px 20px rgba(237, 137, 54, 0.4);
        }

        #qrSection {
            margin: 25px 0;
            padding: 20px;
            background: #f7fafc;
            border-radius: 16px;
            text-align: center;
            border: 2px dashed #cbd5e0;
        }

        #qrCodeContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            min-height: 200px;
            background: white;
            border-radius: 12px;
            padding: 15px;
        }

        #qrCodeContainer img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .qr-note {
            color: #718096;
            font-size: 12px;
            margin-top: 10px;
        }

        .loading {
            color: #667eea;
            font-weight: 600;
        }

        /* ======== صفحة عرض المعلومات ======== */
        .info-page {
            display: none;
        }

        .info-page.active {
            display: block;
        }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            border: 3px solid #667eea;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
        }

        .info-card .card-title {
            text-align: center;
            color: #1a202c;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .info-card .info-field {
            margin-bottom: 20px;
        }

        .info-card .info-field label {
            display: block;
            font-weight: 700;
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .info-card .info-field .value-box {
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            color: #2d3748;
            font-weight: 500;
            word-break: break-all;
            background: #f7fafc;
            transition: 0.3s;
        }

        .info-card .info-field .value-box.email-box {
            border-color: #667eea;
            background: #ebf4ff;
            color: #2b6cb0;
        }

        .info-card .info-field .value-box.password-box {
            border-color: #9f7aea;
            background: #faf5ff;
            color: #6b46c1;
        }

        .info-card .info-field .value-box.phone-box {
            border-color: #48bb78;
            background: #f0fff4;
            color: #276749;
        }

        .info-card .info-field .value-box.birthdate-box {
            border-color: #ed8936;
            background: #fffaf0;
            color: #c05621;
        }

        .info-card .info-field .value-box.editable {
            background: white;
            border-color: #667eea;
            border-width: 3px;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            cursor: text;
        }

        .info-card .info-field .value-box.editable:focus {
            outline: none;
            border-color: #48bb78;
            box-shadow: 0 0 0 4px rgba(72, 187, 120, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            flex: 1;
            min-width: 120px;
        }

        .back-btn {
            margin-top: 10px;
            background: #718096;
        }

        .back-btn:hover {
            background: #4a5568;
        }

        .edit-mode-badge {
            text-align: center;
            background: #fefcbf;
            color: #975a16;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            border: 2px solid #f6c23e;
            display: none;
        }

        .edit-mode-badge.active {
            display: block;
        }

        .success-msg {
            background: #c6f6d5;
            color: #22543d;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .success-msg.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 18px;
            }
            .info-card {
                padding: 20px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .action-buttons button {
                min-width: auto;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ======== الصفحة الرئيسية ======== -->
    <div class="main-page" id="mainPage">
        <h1>📝 مدونة المعلومات</h1>
        
        <form id="infoForm">
            <div class="field">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>
            <div class="field">
                <label>🔑 كلمة المرور</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <div class="field">
                <label>📞 رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
            </div>
            <div class="field">
                <label>🎂 تاريخ الميلاد</label>
                <input type="date" id="birthdate" required>
            </div>
            <button type="submit" id="saveBtn">💾 حفظ المعلومات</button>
            <div class="success-msg" id="successMsg">✅ تم حفظ المعلومات بنجاح!</div>
        </form>

        <div id="qrSection">
            <h3>📱 رمز QR</h3>
            <div id="qrCodeContainer">
                <p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>
            </div>
            <button class="btn-pink" id="generateQrBtn">🔄 إنشاء QR جديد</button>
            <p class="qr-note">📸 صوّر الكود بأي هاتف وستفتح صفحة تعرض المعلومات بشكل جميل</p>
        </div>
    </div>

    <!-- ======== صفحة عرض المعلومات ======== -->
    <div class="info-page" id="infoPage">
        <div class="info-card">
            <div class="card-title">📇 معلومات السجل</div>
            
            <div class="edit-mode-badge" id="editBadge">✏️ وضع التعديل نشط</div>

            <div class="info-field">
                <label>📧 البريد الإلكتروني</label>
                <div class="value-box email-box" id="viewEmail">-</div>
            </div>
            <div class="info-field">
                <label>🔑 كلمة المرور</label>
                <div class="value-box password-box" id="viewPassword">-</div>
            </div>
            <div class="info-field">
                <label>📞 رقم الهاتف</label>
                <div class="value-box phone-box" id="viewPhone">-</div>
            </div>
            <div class="info-field">
                <label>🎂 تاريخ الميلاد</label>
                <div class="value-box birthdate-box" id="viewBirthdate">-</div>
            </div>

            <div class="action-buttons">
                <button class="btn-orange" id="editBtn">✏️ تعديل المعلومات</button>
                <button class="btn-green" id="saveEditBtn" style="display:none;">💾 حفظ التعديلات</button>
                <button id="cancelEditBtn" style="display:none; background:#fc8181;">❌ إلغاء</button>
            </div>

            <button class="back-btn" onclick="goBack()">🔙 العودة للصفحة الرئيسية</button>
        </div>
    </div>

</div>

<script>
// ======== العناصر ========
const form = document.getElementById('infoForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const phone = document.getElementById('phone');
const birthdate = document.getElementById('birthdate');
const qrContainer = document.getElementById('qrCodeContainer');
const generateBtn = document.getElementById('generateQrBtn');
const saveBtn = document.getElementById('saveBtn');
const successMsg = document.getElementById('successMsg');

// عناصر صفحة العرض
const mainPage = document.getElementById('mainPage');
const infoPage = document.getElementById('infoPage');
const viewEmail = document.getElementById('viewEmail');
const viewPassword = document.getElementById('viewPassword');
const viewPhone = document.getElementById('viewPhone');
const viewBirthdate = document.getElementById('viewBirthdate');
const editBtn = document.getElementById('editBtn');
const saveEditBtn = document.getElementById('saveEditBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const editBadge = document.getElementById('editBadge');

let records = JSON.parse(localStorage.getItem('records')) || [];
let currentData = null;
let isEditMode = false;

// ======== إنشاء رابط ========
function createShareableLink(data) {
    const encoded = encodeURIComponent(JSON.stringify(data));
    return window.location.origin + window.location.pathname + '?data=' + encoded;
}

// ======== توليد QR ========
function generateQR(data) {
    const url = createShareableLink(data);
    const encodedUrl = encodeURIComponent(url);
    const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodedUrl}&format=png&margin=20`;
    
    qrContainer.innerHTML = `<p class="loading">⏳ جاري إنشاء QR...</p>`;
    
    const img = document.createElement('img');
    img.src = apiUrl;
    img.alt = 'QR Code';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    
    img.onload = function() {
        qrContainer.innerHTML = '';
        qrContainer.appendChild(img);
        console.log('✅ تم إنشاء QR Code');
    };
    
    img.onerror = function() {
        qrContainer.innerHTML = '<p style="color:#e53e3e;">⚠️ حدث خطأ، حاول مرة أخرى</p>';
        console.error('❌ فشل تحميل QR');
    };
}

// ======== حفظ ========
form.addEventListener('submit', function(e) {
    e.preventDefault();
    console.log('✅ تم الضغط على زر الحفظ');
    
    if (!email.value || !password.value || !phone.value || !birthdate.value) {
        alert('⚠️ املأ جميع الحقول');
        return;
    }
    
    const data = {
        email: email.value,
        password: password.value,
        phone: phone.value,
        birthdate: birthdate.value
    };
    
    console.log('📦 البيانات:', data);
    
    records.push(data);
    localStorage.setItem('records', JSON.stringify(records));
    generateQR(data);
    
    successMsg.classList.add('show');
    setTimeout(() => successMsg.classList.remove('show'), 3000);
    
    saveBtn.textContent = '✅ تم الحفظ!';
    setTimeout(() => saveBtn.textContent = '💾 حفظ المعلومات', 2000);
    
    // تنظيف الحقول
    email.value = '';
    password.value = '';
    phone.value = '';
    birthdate.value = '';
});

// ======== زر توليد QR ========
generateBtn.addEventListener('click', function() {
    if (records.length === 0) {
        alert('⚠️ لا توجد سجلات');
        return;
    }
    const last = records[records.length - 1];
    generateQR(last);
    this.textContent = '✅ تم!';
    setTimeout(() => this.textContent = '🔄 إنشاء QR جديد', 2000);
});

// ======== تفعيل التعديل ========
function enableEditMode() {
    isEditMode = true;
    editBadge.classList.add('active');
    
    viewEmail.contentEditable = 'true';
    viewPassword.contentEditable = 'true';
    viewPhone.contentEditable = 'true';
    viewBirthdate.contentEditable = 'true';
    
    viewEmail.classList.add('editable');
    viewPassword.classList.add('editable');
    viewPhone.classList.add('editable');
    viewBirthdate.classList.add('editable');
    
    editBtn.style.display = 'none';
    saveEditBtn.style.display = 'block';
    cancelEditBtn.style.display = 'block';
}

// ======== إلغاء التعديل ========
function disableEditMode() {
    isEditMode = false;
    editBadge.classList.remove('active');
    
    viewEmail.contentEditable = 'false';
    viewPassword.contentEditable = 'false';
    viewPhone.contentEditable = 'false';
    viewBirthdate.contentEditable = 'false';
    
    viewEmail.classList.remove('editable');
    viewPassword.classList.remove('editable');
    viewPhone.classList.remove('editable');
    viewBirthdate.classList.remove('editable');
    
    if (currentData) {
        viewEmail.textContent = currentData.email;
        viewPassword.textContent = currentData.password;
        viewPhone.textContent = currentData.phone;
        viewBirthdate.textContent = currentData.birthdate;
    }
    
    editBtn.style.display = 'block';
    saveEditBtn.style.display = 'none';
    cancelEditBtn.style.display = 'none';
}

// ======== تعديل ========
editBtn.addEventListener('click', enableEditMode);
cancelEditBtn.addEventListener('click', disableEditMode);

// ======== حفظ التعديلات ========
saveEditBtn.addEventListener('click', function() {
    const newData = {
        email: viewEmail.textContent.trim(),
        password: viewPassword.textContent.trim(),
        phone: viewPhone.textContent.trim(),
        birthdate: viewBirthdate.textContent.trim()
    };
    
    if (!newData.email || !newData.password || !newData.phone || !newData.birthdate) {
        alert('⚠️ جميع الحقول مطلوبة');
        return;
    }
    
    let found = false;
    for (let i = 0; i < records.length; i++) {
        if (records[i].email === currentData.email && 
            records[i].password === currentData.password &&
            records[i].phone === currentData.phone &&
            records[i].birthdate === currentData.birthdate) {
            records[i] = newData;
            found = true;
            break;
        }
    }
    
    if (found) {
        localStorage.setItem('records', JSON.stringify(records));
        currentData = newData;
        
        const newUrl = createShareableLink(newData);
        window.history.pushState({}, '', newUrl);
        generateQR(newData);
        disableEditMode();
        
        alert('✅ تم تحديث المعلومات بنجاح!');
    } else {
        alert('⚠️ حدث خطأ في حفظ التعديلات');
    }
});

// ======== العودة ========
function goBack() {
    infoPage.classList.remove('active');
    mainPage.style.display = 'block';
    window.history.pushState({}, '', window.location.pathname);
    disableEditMode();
}

// ======== قراءة البيانات من الرابط ========
function loadDataFromURL() {
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');
    
    if (dataParam) {
        try {
            const data = JSON.parse(decodeURIComponent(dataParam));
            currentData = data;
            
            mainPage.style.display = 'none';
            infoPage.classList.add('active');
            
            viewEmail.textContent = data.email;
            viewPassword.textContent = data.password;
            viewPhone.textContent = data.phone;
            viewBirthdate.textContent = data.birthdate;
            
            disableEditMode();
            return true;
        } catch(e) {
            console.error('خطأ:', e);
        }
    }
    return false;
}

// ======== بدء التطبيق ========
const isInfoView = loadDataFromURL();

if (!isInfoView) {
    if (records.length > 0) {
        generateQR(records[0]);
    }
}

console.log('✅ التطبيق يعمل بنجاح!');
console.log(`📊 عدد السجلات: ${records.length}`);
</script>

</body>
</html>
