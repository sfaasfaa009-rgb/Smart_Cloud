<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة توليد واسترجاع الباركود الذكي</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
            outline: none;
        }
        input:disabled, select:disabled, textarea:disabled {
            background-color: #e9ecef;
            color: #333;
            font-weight: bold;
        }
        .buttons-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
            text-align: center;
        }
        .btn-save {
            background-color: #28a745;
            color: white;
        }
        .btn-save:hover {
            background-color: #218838;
        }
        .btn-qr {
            background-color: #17a2b8;
            color: white;
        }
        .btn-qr:hover {
            background-color: #138496;
        }
        .btn-edit {
            background-color: #007bff;
            color: white;
        }
        .btn-edit:hover {
            background-color: #0069d9;
        }
        .qr-section {
            margin-top: 25px;
            text-align: center;
            display: none;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .qr-section p {
            font-size: 13px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .sync-status {
            font-size: 13px;
            color: #007bff;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        /* شاشة قفل تجديد الاشتراك لصاحب المحل */
        .lock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c10; color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px;
        }
        .lock-box {
            background: #12131a; padding: 30px 20px; border-radius: 16px;
            border: 1px solid #1f222f; max-width: 380px; width: 100%;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .lock-box h3 { color: #d4a359; margin-bottom: 15px; }
        .lock-box p { color: #a0aec0; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
        .code-display {
            font-size: 24px; font-weight: bold; color: #ffffff;
            background: #1f222f; padding: 10px; border-radius: 6px;
            letter-spacing: 4px; margin-bottom: 20px; border: 1px dashed #d4a359;
        }
        .lock-box input {
            background: #1f222f; color: #fff; border: 1px solid #2d3142;
            text-align: center; font-size: 18px; letter-spacing: 2px; margin-bottom: 15px;
        }
        .lock-box input:focus { border-color: #d4a359; }
        .btn-unlock { background-color: #d4a359; color: #0b0c10; font-weight: bold; }
        .btn-unlock:hover { background-color: #bfa147; }
    </style>
</head>
<body>

<div id="lockOverlay" class="lock-overlay" style="display: none;">
    <div class="lock-box">
        <h3>🔐 تفعيل الاشتراك الشهري</h3>
        <p>انتهت صلاحية النظام لهذا الشهر. يرجى تزويد الإدارة بالرمز التالي للحصول على كود التجديد:</p>
        <div id="randomCodeDisplay" class="code-display">0000</div>
        <div class="form-group">
            <input type="number" id="activationKeyInput" placeholder="أدخل كود التفعيل هنا">
        </div>
        <button type="button" class="btn btn-unlock" onclick="checkActivation()">تفعيل النظام</button>
    </div>
</div>

<div class="container">
    <h2>حفظ البيانات بالباركود الذكي</h2>
    
    <div id="syncMessage" class="sync-status" style="display: none;">🔄 جاري فحص السحاب...</div>

    <form id="infoForm">
        <div class="form-group">
            <label for="email">البريد الإلكتروني (Email)</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور (Password)</label>
            <input type="text" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="phone">رقم الهاتف (Phone Number)</label>
            <input type="tel" id="phone" placeholder="07xxxxxxxx" required>
        </div>

        <div class="form-group">
            <label for="birthdate">تاريخ الميلاد (Birthdate)</label>
            <input type="date" id="birthdate" required>
        </div>

        <div class="buttons-stack">
            <button type="submit" id="saveBtn" class="btn btn-save">حفظ المعلومات</button>
            <button type="button" id="editBtn" class="btn btn-edit" style="display: none;">تعديل المعلومات</button>
            <button type="button" id="generateQrBtn" class="btn btn-qr" style="display: block;">إنشاء باركود QR</button>
        </div>
    </form>

    <div id="qrSection" class="qr-section">
        <p>✅ هذا الباركود ثابت وخاص بك، يمكنك تصويره أو طباعته ولن يتغير شكل الكود أبداً عند التعديل مستقبلاً.</p>
        <div id="qrcode"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    const form = document.getElementById('infoForm');
    const inputs = form.querySelectorAll('input, select, textarea');
    const saveBtn = document.getElementById('saveBtn');
    const editBtn = document.getElementById('editBtn');
    const generateQrBtn = document.getElementById('generateQrBtn');
    const qrSection = document.getElementById('qrSection');
    const qrcodeDiv = document.getElementById('qrcode');
    const syncMessage = document.getElementById('syncMessage');

    let generatedUrl = "";
    let systemRandomCode = 0;
    let isCustomerMode = false;
    let cloudStorageKey = ""; 

    const backupCloudUrl = "https://kvdb.io/AymanSafaaVipProject/";

    function checkSystemAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('e') || urlParams.get('ph')) return; // زبون
        
        const expiryKey = localStorage.getItem('owner_expiry_date');
        const today = new Date().toISOString().split('T')[0];
        if (!expiryKey || today > expiryKey) {
            systemRandomCode = Math.floor(1000 + Math.random() * 9000);
            const lockOverlay = document.getElementById('lockOverlay');
            const randomCodeDisplay = document.getElementById('randomCodeDisplay');
            if (lockOverlay && randomCodeDisplay) {
                randomCodeDisplay.innerText = systemRandomCode;
                lockOverlay.style.display = 'flex';
            }
        }
    }

    function checkActivation() {
        const userInput = parseInt(document.getElementById('activationKeyInput').value);
        const correctAnswer = systemRandomCode + 2026;
        if (userInput === correctAnswer) {
            const newExpiry = new Date();
            newExpiry.setDate(newExpiry.getDate() + 30);
            localStorage.setItem('owner_expiry_date', newExpiry.toISOString().split('T')[0]);
            document.getElementById('lockOverlay').style.display = 'none';
            alert('🎉 تم تفعيل النظام بنجاح لمدة 30 يوماً!');
        } else {
            alert('❌ كود التفعيل غير صحيح!');
        }
    }

    function refreshQRCode(url) {
        if (qrcodeDiv) {
            qrcodeDiv.innerHTML = ""; 
            new QRCode(qrcodeDiv, { text: url, width: 180, height: 180 });
            if (qrSection) qrSection.style.display = 'block';
        }
    }

    window.addEventListener('DOMContentLoaded', async () => {
        checkSystemAccess();

        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('e');
        const phoneParam = urlParams.get('ph');

        // كشف نمط الفتح: هل هو زبون يفتح من باركود مطبوع؟
        if (emailParam || phoneParam) {
            isCustomerMode = true;
            if (generateQrBtn) generateQrBtn.style.display = 'none'; // إخفاء زر التوليد للزبون تماماً
            if (syncMessage) {
                syncMessage.style.display = 'block';
                syncMessage.innerText = "⏳ جاري جلب أحدث التعديلات السحابية...";
            }

            const uniqueSeed = (emailParam || '') + (phoneParam || '');
            cloudStorageKey = "id_" + uniqueSeed.replace(/[^a-zA-Z0-9]/g, "").substring(0, 30);

            // تعبئة البيانات الأصلية
            inputs.forEach(input => {
                const paramValue = urlParams.get(input.id);
                if (paramValue) {
                    try {
                        input.value = atob(paramValue);
                    } catch(e) {
                        input.value = paramValue;
                    }
                }
            });

            // جلب التعديلات السحابية
            try {
                const response = await fetch(backupCloudUrl + cloudStorageKey);
                if (response.ok) {
                    const cloudData = await response.json();
                    if (cloudData) {
                        inputs.forEach(input => {
                            if (cloudData[input.id] !== undefined) {
                                input.value = cloudData[input.id];
                            }
                        });
                        if (syncMessage) syncMessage.innerText = "⚡ تم مزامنة التعديلات بنجاح!";
                    }
                } else {
                    if (syncMessage) syncMessage.innerText = "✨ تعرض النسخة الأصلية المطبوعة.";
                }
            } catch(e) {
                if (syncMessage) syncMessage.innerText = "ℹ️ تعمل بالنسخة الأصلية المطبوعة.";
            }

            inputs.forEach(input => input.disabled = true);
            if (saveBtn) saveBtn.style.display = 'none';
            if (editBtn) editBtn.style.display = 'block';
        } else {
            // نمط صاحب المحل لأول مرة: الحقول مفتوحة، والأزرار جاهزة للتوليد
            isCustomerMode = false;
            if (syncMessage) syncMessage.style.display = 'none';
            if (generateQrBtn) generateQrBtn.style.display = 'block';
            if (saveBtn) saveBtn.style.display = 'block';
            if (editBtn) editBtn.style.display = 'none';
        }
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = {};
        inputs.forEach(input => {
            formData[input.id] = input.value;
        });

        if (isCustomerMode) {
            if (!saveBtn) return;
            saveBtn.disabled = true;
            saveBtn.innerText = "⏳ جاري الحفظ سحابياً...";
            try {
                const res = await fetch(backupCloudUrl + cloudStorageKey, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (res.ok) {
                    if (syncMessage) syncMessage.innerText = "✅ تم حفظ التعديلات سحابياً لجميع الأجهزة!";
                    alert('✅ نجحت المزامنة! تم حفظ التعديلات سحابياً لجميع الأجهزة.');
                } else {
                    alert('فشل الحفظ، يرجى إعادة المحاولة.');
                }
            } catch (err) {
                alert('يرجى التأكد من اتصال الإنترنت لرفع التعديلات.');
            }
            saveBtn.disabled = false;
            saveBtn.innerText = "حفظ المعلومات";
            inputs.forEach(input => input.disabled = true);
            if (saveBtn) saveBtn.style.display = 'none';
            if (editBtn) editBtn.style.display = 'block';
        } else {
            // صاحب المحل يقوم بالحفظ المحلي أولاً لتجميع الرابط
            let queryParts = [];
            inputs.forEach(input => {
                if (input.value) {
                    queryParts.push(`${input.id}=${btoa(unescape(encodeURIComponent(input.value)))}`);
                }
            });
            
            const emailVal = document.getElementById('email') ? document.getElementById('email').value : '';
            const phoneVal = document.getElementById('phone') ? document.getElementById('phone').value : '';
            
            generatedUrl = window.location.origin + window.location.pathname + `?e=${btoa(emailVal)}&ph=${btoa(phoneVal)}&` + queryParts.join('&');
            alert('تم حفظ البيانات محلياً بنجاح! يمكنك الآن الضغط مباشرة على زر "إنشاء باركود QR".');
        }
    });

    if (generateQrBtn) {
        generateQrBtn.addEventListener('click', function() {
            // إذا ضغط صاحب المحل بدون ملء البيانات
            const emailVal = document.getElementById('email') ? document.getElementById('email').value : '';
            const phoneVal = document.getElementById('phone') ? document.getElementById('phone').value : '';
            
            if(!emailVal || !phoneVal) {
                alert('يرجى ملء البيانات أولاً وضغط حفظ قبل توليد الـ QR.');
                return;
            }

            let queryParts = [];
            inputs.forEach(input => {
                if (input.value) {
                    queryParts.push(`${input.id}=${btoa(unescape(encodeURIComponent(input.value)))}`);
                }
            });

            generatedUrl = window.location.origin + window.location.pathname + `?e=${btoa(emailVal)}&ph=${btoa(phoneVal)}&` + queryParts.join('&');
            
            window.history.pushState({}, '', generatedUrl);
            refreshQRCode(generatedUrl);
        });
    }

    if (editBtn) {
        editBtn.addEventListener('click', function() {
            inputs.forEach(input => input.disabled = false);
            if (editBtn) editBtn.style.display = 'none';
            if (saveBtn) saveBtn.style.display = 'block';
        });
    }
</script>

</body>
</html>
