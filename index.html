<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات الزبون</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #12131a;
            border: 1px solid #1f222f;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 30px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* قسم الشعارات العلوي - تم إصلاحه ليعمل بدون صور خارجية */
        .brands-header {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1f222f;
        }

        .brand-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #e5e7eb;
            background: #1a1c26;
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid #2d3142;
        }

        /* دوائر ملونة كبديل ذكي وفوري للشعارات المكسورة */
        .brand-dot {
            width: 100%;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-apple { background-color: #ffffff; }
        .dot-outlook { background-color: #0078d4; }
        .dot-steam { background-color: #171a21; border: 1px solid #fff; }

        /* تنسيق الحقول */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #9ca3af;
        }

        .input-field {
            width: 100%;
            background-color: #1a1c26;
            border: 1px solid #2d3142;
            border-radius: 12px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #13542b;
        }

        /* حقل الإيميل يسار ليمين */
        .input-field[type="email"] {
            text-align: left;
            direction: ltr;
        }

        /* إصلاح حقل التاريخ الجذري ليعمل على الهاتف دون تداخل */
        .input-field[type="date"] {
            direction: rtl;
            text-align: right;
            cursor: pointer;
        }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-submit {
            background-color: #13542b;
            color: #ffffff;
            margin-top: 25px;
        }

        .btn-submit:hover {
            background-color: #1a6e3a;
        }

        .btn-qr {
            background-color: #374151;
            color: #e5e7eb;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعارات بعد إصلاح مشكلة الصور المكسورة -->
        <div class="brands-header">
            <div class="brand-item">
                <span class="brand-dot dot-apple"></span>
                <span>App Store</span>
            </div>
            <div class="brand-item">
                <span class="brand-dot dot-outlook"></span>
                <span>Outlook</span>
            </div>
            <div class="brand-item">
                <span class="brand-dot dot-steam"></span>
                <span>Steam</span>
            </div>
        </div>

        <!-- النموذج -->
        <form id="customerForm">
            
            <div class="form-group">
                <label>البريد الإلكتروني (Email)</label>
                <input type="email" class="input-field" placeholder="rorotyty56655@gmail.com" required>
            </div>

            <div class="form-group">
                <label>كلمة المرور (Password)</label>
                <input type="password" class="input-field" placeholder="••••••••••••" required>
            </div>

            <!-- حقل التاريخ الصافي والنظيف لتجنب ظهور القائمة البيضاء المكسورة -->
            <div class="form-group">
                <label>تاريخ الميلاد (Birthdate)</label>
                <input type="date" class="input-field" required>
            </div>

            <button type="submit" class="btn btn-submit">حفظ بيانات الزبون</button>
            <button type="button" class="btn btn-qr">إنشاء باركود QR للزبون</button>

        </form>
    </div>

</body>
</html>
