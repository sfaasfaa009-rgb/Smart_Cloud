<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفظ بيانات الزبون</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #080808;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #121315;
            width: 100%;
            max-width: 380px;
            border-radius: 25px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* قسم الشعارات العلوي - مرتب من اليسار إلى اليمين */
        .logos-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            direction: ltr; 
            padding: 0 10px;
        }

        .logos-container img {
            height: 38px;
            width: auto;
            object-fit: contain;
        }

        /* شعار آبل البسيط بدون إضافات مشوهة */
        .apple-logo {
            height: 35px !important;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 500;
        }

        /* حقول الإدخال مع إرجاع التوهج والظل الأصفر المحيط */
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            background-color: #1e1f22;
            border: 1px solid #2d2f34;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            text-align: right;
            outline: none;
            /* التوهج الأصفر الثابت المحيط بالمستطيلات كما في الصورة الأولى */
            box-shadow: 0 0 8px rgba(255, 193, 7, 0.25);
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #ffb300;
            box-shadow: 0 0 12px rgba(255, 179, 0, 0.5);
        }

        /* تنسيق الحقول الإنجليزية */
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="tel"] {
            direction: ltr;
            text-align: left;
        }

        .form-group input::placeholder {
            color: #4f535c;
        }

        /* الأزرار مع التوهج الأصفر المحيط بها أيضاً */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 0 8px rgba(255, 193, 7, 0.2);
        }

        .btn-submit {
            background-color: #1b722c;
            color: #ffffff;
        }

        .btn-qr {
            background-color: #555b61;
            color: #ffffff;
            margin-bottom: 0;
        }

        /* أسفل الصفحة فارغ تماماً ونظيف */
        .footer-spacer {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعارات بالروابط البديلة المستقرة والترتيب الصحيح -->
        <div class="logos-container">
            <!-- 1. Google Play -->
            <img src="https://jsbin-user-assets.s3.amazonaws.com/rlemon/google-play.png" alt="Google Play" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Google_Play_2022_icon.svg/512px-Google_Play_2022_icon.svg.png'">
            
            <!-- 2. App Store (Apple) -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Apple_logo_black.svg/512px-Apple_logo_black.svg.png" alt="App Store" class="apple-logo" style="filter: invert(0.75);">
            
            <!-- 3. Outlook -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Microsoft_Office_Outlook_%282018%E2%80%93present%29.svg/512px-Microsoft_Office_Outlook_%282018%E2%80%93present%29.svg.png" alt="Outlook">
            
            <!-- 4. Steam -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Steam_icon_logo.svg/512px-Steam_icon_logo.svg.png" alt="Steam">
        </div>

        <!-- الإستمارة -->
        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label>(Email) البريد الإلكتروني</label>
                <input type="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label>(Password) كلمة المرور</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>(Phone Number) رقم الهاتف</label>
                <input type="tel" placeholder="07xxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label>(Birthdate) تاريخ الميلاد</label>
                <select required>
                    <option value="" disabled selected hidden></option>
                    <option value="1">اختر التاريخ...</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit">حفظ بيانات الزبون</button>
            <button type="button" class="btn btn-qr">للزبون QR إنشاء باركود</button>
        </form>

        <div class="footer-spacer"></div>
    </div>

</body>
</html>
