<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة المعلومات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 14px;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f7fafc;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        /* كلمة المرور تظهر كاملة */
        .field input[type="password"] {
            -webkit-text-security: none;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-pink:hover {
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        #qrSection {
            margin: 25px 0;
            padding: 20px;
            background: #f7fafc;
            border-radius: 16px;
            text-align: center;
            border: 2px dashed #cbd5e0;
        }

        #qrCodeContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            min-height: 200px;
            background: white;
            border-radius: 12px;
            padding: 15px;
        }

        #qrCodeContainer img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        #recordsList {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .record-item {
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border-right: 5px solid #667eea;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .record-item .data {
            font-size: 13px;
            color: #2d3748;
            word-break: break-all;
            flex: 1;
        }

        .record-item .delete-btn {
            background: #fc8181;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            width: auto;
            margin: 0;
        }

        .record-item .delete-btn:hover {
            background: #e53e3e;
        }

        hr {
            margin: 20px 0;
            border: 1px dashed #e2e8f0;
        }

        /* بطاقة المعلومات الجميلة */
        .info-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            border: 3px solid #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }

        .info-card h3 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #667eea;
            font-size: 20px;
        }

        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            gap: 15px;
            align-items: center;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 700;
            color: #4a5568;
            min-width: 110px;
            font-size: 14px;
        }

        .info-value {
            color: #2d3748;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            padding: 8px 14px;
            border-radius: 8px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
        }

        .info-value.email-value {
            border-color: #667eea;
            background: #ebf4ff;
            color: #2b6cb0;
        }

        .info-value.password-value {
            border-color: #9f7aea;
            background: #faf5ff;
            color: #6b46c1;
        }

        .info-value.phone-value {
            border-color: #48bb78;
            background: #f0fff4;
            color: #276749;
        }

        .info-value.birthdate-value {
            border-color: #ed8936;
            background: #fffaf0;
            color: #c05621;
        }

        .qr-note {
            color: #718096;
            font-size: 12px;
            margin-top: 10px;
        }

        /* مؤقت التحميل */
        .loading {
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .container {
                padding: 18px;
            }
            .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .info-label {
                min-width: auto;
            }
            .info-value {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 مدونة المعلومات</h1>
    
    <form id="infoForm">
        <div class="field">
            <label>📧 البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="field">
            <label>🔑 كلمة المرور</label>
            <input type="password" id="password" placeholder="********" required>
        </div>
        <div class="field">
            <label>📞 رقم الهاتف</label>
            <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
        </div>
        <div class="field">
            <label>🎂 تاريخ الميلاد</label>
            <input type="date" id="birthdate" required>
        </div>
        <button type="submit">💾 حفظ المعلومات</button>
    </form>

    <div id="qrSection">
        <h3>📱 رمز QR</h3>
        <div id="qrCodeContainer">
            <p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>
        </div>
        <button class="btn-pink" id="generateQrBtn">🔄 إنشاء QR جديد</button>
        <p class="qr-note">📸 صوّر الكود بأي هاتف وستظهر المعلومات في حقول جميلة</p>
    </div>

    <hr>

    <h3>📋 السجلات المحفوظة</h3>
    <div id="recordsList"></div>

    <div id="displayArea"></div>
</div>

<script>
// ======== العناصر ========
const form = document.getElementById('infoForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const phone = document.getElementById('phone');
const birthdate = document.getElementById('birthdate');
const qrContainer = document.getElementById('qrCodeContainer');
const generateBtn = document.getElementById('generateQrBtn');
const recordsList = document.getElementById('recordsList');
const displayArea = document.getElementById('displayArea');

let records = JSON.parse(localStorage.getItem('records')) || [];

// ======== تنسيق النص للـ QR ========
function formatText(data) {
    return `📇 معلومات السجل\n━━━━━━━━━━━━━━━━━━\n📧 البريد: ${data.email}\n🔑 كلمة المرور: ${data.password}\n📞 الهاتف: ${data.phone}\n🎂 تاريخ الميلاد: ${data.birthdate}\n━━━━━━━━━━━━━━━━━━\n📅 ${new Date().toLocaleString('ar-SA')}`;
}

// ======== توليد QR Code باستخدام API ========
function generateQR(data) {
    const text = formatText(data);
    const encodedText = encodeURIComponent(text);
    const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodedText}&format=png&margin=20`;
    
    qrContainer.innerHTML = `<p class="loading">⏳ جاري إنشاء QR...</p>`;
    
    // إنشاء صورة QR
    const img = document.createElement('img');
    img.src = apiUrl;
    img.alt = 'QR Code';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    
    img.onload = function() {
        qrContainer.innerHTML = '';
        qrContainer.appendChild(img);
    };
    
    img.onerror = function() {
        qrContainer.innerHTML = '<p style="color:#e53e3e;">⚠️ حدث خطأ في إنشاء QR، حاول مرة أخرى</p>';
    };
}

// ======== عرض بطاقة المعلومات ========
function showInfoCard(data) {
    displayArea.innerHTML = `
        <div class="info-card">
            <h3>📇 معلومات السجل</h3>
            <div class="info-row">
                <span class="info-label">📧 البريد الإلكتروني</span>
                <span class="info-value email-value">${data.email}</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔑 كلمة المرور</span>
                <span class="info-value password-value">${data.password}</span>
            </div>
            <div class="info-row">
                <span class="info-label">📞 رقم الهاتف</span>
                <span class="info-value phone-value">${data.phone}</span>
            </div>
            <div class="info-row">
                <span class="info-label">🎂 تاريخ الميلاد</span>
                <span class="info-value birthdate-value">${data.birthdate}</span>
            </div>
        </div>
    `;
}

// ======== عرض السجلات ========
function showRecords() {
    if (records.length === 0) {
        recordsList.innerHTML = '<p style="color:#a0aec0; text-align:center;">📭 لا توجد سجلات</p>';
        return;
    }
    recordsList.innerHTML = records.map((rec, i) => `
        <div class="record-item">
            <span class="data">📧 ${rec.email} | 🔑 ${rec.password} | 📞 ${rec.phone} | 🎂 ${rec.birthdate}</span>
            <button class="delete-btn" onclick="deleteRecord(${i})">✖</button>
        </div>
    `).join('');
}

// ======== حفظ ========
form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    if (!email.value || !password.value || !phone.value || !birthdate.value) {
        alert('⚠️ املأ جميع الحقول');
        return;
    }
    
    const data = {
        email: email.value,
        password: password.value,
        phone: phone.value,
        birthdate: birthdate.value
    };
    
    records.push(data);
    localStorage.setItem('records', JSON.stringify(records));
    showRecords();
    generateQR(data);
    showInfoCard(data);
    form.reset();
    
    const btn = form.querySelector('button[type="submit"]');
    btn.textContent = '✅ تم الحفظ!';
    setTimeout(() => btn.textContent = '💾 حفظ المعلومات', 2000);
});

// ======== زر توليد QR ========
generateBtn.addEventListener('click', function() {
    if (records.length === 0) {
        alert('⚠️ لا توجد سجلات');
        return;
    }
    const last = records[records.length - 1];
    generateQR(last);
    showInfoCard(last);
    this.textContent = '✅ تم!';
    setTimeout(() => this.textContent = '🔄 إنشاء QR جديد', 2000);
});

// ======== حذف ========
function deleteRecord(index) {
    if (confirm('🗑️ تأكد من الحذف؟')) {
        records.splice(index, 1);
        localStorage.setItem('records', JSON.stringify(records));
        showRecords();
        if (records.length > 0) {
            generateQR(records[records.length - 1]);
            showInfoCard(records[records.length - 1]);
        } else {
            qrContainer.innerHTML = '<p style="color:#a0aec0;">📭 أدخل معلومات ثم اضغط حفظ</p>';
            displayArea.innerHTML = '';
        }
    }
}

// ======== بدء التطبيق ========
showRecords();
if (records.length > 0) {
    generateQR(records[0]);
    showInfoCard(records[0]);
}

console.log('✅ التطبيق يعمل بنجاح!');
</script>

</body>
</html>
