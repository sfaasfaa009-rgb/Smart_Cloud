<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدونة توليد واسترجاع الباركود الذكي</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        input:disabled {
            background-color: #e9ecef;
            color: #333;
            font-weight: bold;
        }
        .buttons-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
            text-align: center;
        }
        .btn-save {
            background-color: #28a745;
            color: white;
        }
        .btn-save:hover {
            background-color: #218838;
        }
        .btn-qr {
            background-color: #17a2b8;
            color: white;
        }
        .btn-qr:hover {
            background-color: #138496;
        }
        .btn-qr:disabled {
            background-color: #6c757d;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-edit {
            background-color: #007bff;
            color: white;
        }
        .btn-edit:hover {
            background-color: #0069d9;
        }
        .qr-section {
            margin-top: 25px;
            text-align: center;
            display: none;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .qr-section p {
            font-size: 13px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .sync-status {
            font-size: 12px;
            color: #6c757d;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        /* شاشة قفل تجديد الاشتراك لصاحب المحل */
        .lock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c10; color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px;
        }
        .lock-box {
            background: #12131a; padding: 30px 20px; border-radius: 16px;
            border: 1px solid #1f222f; max-width: 380px; width: 100%;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .lock-box h3 { color: #d4a359; margin-bottom: 15px; }
        .lock-box p { color: #a0aec0; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
        .code-display {
            font-size: 24px; font-weight: bold; color: #ffffff;
            background: #1f222f; padding: 10px; border-radius: 6px;
            letter-spacing: 4px; margin-bottom: 20px; border: 1px dashed #d4a359;
        }
        .lock-box input {
            background: #1f222f; color: #fff; border: 1px solid #2d3142;
            text-align: center; font-size: 18px; letter-spacing: 2px; margin-bottom: 15px;
        }
        .lock-box input:focus { border-color: #d4a359; }
        .btn-unlock { background-color: #d4a359; color: #0b0c10; font-weight: bold; }
        .btn-unlock:hover { background-color: #bfa147; }
    </style>
</head>
<body>

<div id="lockOverlay" class="lock-overlay" style="display: none;">
    <div class="lock-box">
        <h3>🔐 تفعيل الاشتراك الشهري</h3>
        <p>انتهت صلاحية النظام لهذا الشهر. يرجى تزويد الإدارة بالرمز التالي للحصول على كود التجديد:</p>
        <div id="randomCodeDisplay" class="code-display">0000</div>
        <div class="form-group">
            <input type="number" id="activationKeyInput" placeholder="أدخل كود التفعيل هنا">
        </div>
        <button type="button" class="btn btn-unlock" onclick="checkActivation()">تفعيل النظام</button>
    </div>
</div>

<div class="container">
    <h2>حفظ البيانات بالباركود الذكي</h2>
    
    <div id="syncMessage" class="sync-status">🔄 جاري التحقق من أحدث التعديلات سحابياً...</div>

    <form id="infoForm">
        <div class="form-group">
            <label for="email">البريد الإلكتروني (Email)</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">كلمة المرور (Password)</label>
            <input type="text" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="phone">رقم الهاتف (Phone Number)</label>
            <input type="tel" id="phone" placeholder="07xxxxxxxx" required>
        </div>

        <div class="form-group">
            <label for="birthdate">تاريخ الميلاد (Birthdate)</label>
            <input type="date" id="birthdate" required>
        </div>

        <div class="buttons-stack">
            <button type="submit" id="saveBtn" class="btn btn-save">حفظ / Save</button>
            <button type="button" id="editBtn" class="btn btn-edit" style="display: none;">تعديل المعلومات</button>
            <button type="button" id="generateQrBtn" class="btn btn-qr" disabled>إنشاء باركود QR</button>
        </div>
    </form>

    <div id="qrSection" class="qr-section">
        <p>✅ هذا الباركود ثابت وخاص بك، يمكنك تصويره أو طباعته ولن يتغير شكل الكود أبداً عند التعديل مستقبلاً.</p>
        <div id="qrcode"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    const form = document.getElementById('infoForm');
    const inputs = form.querySelectorAll('input');
    const saveBtn = document.getElementById('saveBtn');
    const editBtn = document.getElementById('editBtn');
    const generateQrBtn = document.getElementById('generateQrBtn');
    const qrSection = document.getElementById('qrSection');
    const qrcodeDiv = document.getElementById('qrcode');
    const syncMessage = document.getElementById('syncMessage');

    let generatedUrl = "";
    let systemRandomCode = 0;
    let isCustomerMode = false;
    let cloudStorageId = ""; 

    // مستودع المزامنة السحابية الفورية
    const apiBase = "https://api.restful-api.dev/objects";

    function checkSystemAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('e')) return;

        const expiryKey = localStorage.getItem('owner_expiry_date');
        const today = new Date().toISOString().split('T')[0];

        if (!expiryKey || today > expiryKey) {
            systemRandomCode = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('randomCodeDisplay').innerText = systemRandomCode;
            document.getElementById('lockOverlay').style.display = 'flex';
        }
    }

    function checkActivation() {
        const userInput = parseInt(document.getElementById('activationKeyInput').value);
        const correctAnswer = systemRandomCode + 2026;

        if (userInput === correctAnswer) {
            const newExpiry = new Date();
            newExpiry.setDate(newExpiry.getDate() + 30);
            localStorage.setItem('owner_expiry_date', newExpiry.toISOString().split('T')[0]);
            document.getElementById('lockOverlay').style.display = 'none';
            alert('🎉 تم تفعيل النظام بنجاح لمدة 30 يوماً كاملة!');
        } else {
            alert('❌ كود التفعيل غير صحيح!');
        }
    }

    function refreshQRCode(url) {
        qrcodeDiv.innerHTML = ""; 
        new QRCode(qrcodeDiv, {
            text: url,
            width: 180,
            height: 180
        });
        qrSection.style.display = 'block';
    }

    // جلب ومزامنة البيانات عند فتح الصفحة
    window.addEventListener('DOMContentLoaded', async () => {
        checkSystemAccess();

        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('e');
        const passParam = urlParams.get('p');
        const phoneParam = urlParams.get('ph');
        const dateParam = urlParams.get('d');

        if (emailParam && passParam && phoneParam && dateParam) {
            isCustomerMode = true;
            generateQrBtn.style.display = 'none'; 
            syncMessage.style.display = 'block';

            // إنشاء معرف سحابي ثابت معتمد على بارامتر الهاتف
            cloudStorageId = phoneParam.replaceAll('=', '') + "994";

            // فحص كاش المتصفح أولاً لمعرفة إذا كان قد عدل البيانات مؤخراً في هذا الجهاز
            const localCache = sessionStorage.getItem('current_user_data');
            
            if (localCache) {
                const parsed = JSON.parse(localCache);
                document.getElementById('email').value = parsed.email;
                document.getElementById('password').value = parsed.password;
                document.getElementById('phone').value = parsed.phone;
                document.getElementById('birthdate').value = parsed.birthdate;
                syncMessage.innerText = "⚡ تم تحميل البيانات المعدلة حديثاً.";
            } else {
                // عرض البيانات الأصلية المدمجة بالرابط فوراً لمنع أي فراغات
                document.getElementById('email').value = atob(emailParam);
                document.getElementById('password').value = atob(passParam);
                document.getElementById('phone').value = atob(phoneParam);
                document.getElementById('birthdate').value = dateParam;
            }

            // فحص السحابة بشكل خلفي لجلب التعديلات إذا تمت من جهاز آخر
            try {
                const response = await fetch(`${apiBase}/${cloudStorageId}`);
                if (response.ok) {
                    const result = await response.json();
                    if (result && result.data && !localCache) { // إذا لم يكن هناك كاش محلي أحدث، نعتمد السحاب
                        document.getElementById('email').value = result.data.email;
                        document.getElementById('password').value = result.data.password;
                        document.getElementById('phone').value = result.data.phone;
                        document.getElementById('birthdate').value = result.data.birthdate;
                        syncMessage.innerText = "⚡ تم مزامنة أحدث التعديلات من السحاب!";
                    }
                } else {
                    if(!localCache) syncMessage.innerText = "ℹ️ البيانات معروضة بنسختها الأصلية المطبوعة.";
                }
            } catch(e) {
                if(!localCache) syncMessage.innerText = "⚠️ تعذر الاتصال بالسحاب. تم عرض البيانات المتوفرة.";
            }

            inputs.forEach(input => input.disabled = true);
            saveBtn.style.display = 'none';
            editBtn.style.display = 'block';

            generatedUrl = window.location.href;
            refreshQRCode(generatedUrl);
        } else {
            syncMessage.style.display = 'none';
        }
    });

    // عند الضغط على زر حفظ التعديلات أو البيانات
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        saveBtn.disabled = true;
        saveBtn.innerText = "⏳ جاري حفظ التعديلات...";

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const birthdate = document.getElementById('birthdate').value;

        if (isCustomerMode) {
            // خطوة 1: حفظ فوري في كاش المتصفح لمنع حقول المدخلات من العودة للقيم القديمة
            const updatedData = { email, password, phone, birthdate };
            sessionStorage.setItem('current_user_data', JSON.stringify(updatedData));

            // خطوة 2: رفع التحديثات للسحاب لتحديث جميع الأجهزة الأخرى
            const payload = {
                id: cloudStorageId,
                name: "User_" + cloudStorageId,
                data: updatedData
            };

            try {
                await fetch(apiBase, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                syncMessage.innerText = "⚡ تم حفظ التعديلات سحابياً وبنجاح!";
                alert('✅ تم حفظ تعديلاتك بنجاح وبقيت ثابتة على الشاشة! ستظهر هذه التعديلات الجديدة في أي جهاز آخر يتم مسح الباركود منه.');
            } catch (err) {
                alert('تم حفظ التعديلات محلياً على الهاتف، يرجى التحقق من اتصال الإنترنت لضمان مزامنتها مع الأجهزة الأخرى.');
            }
        } else {
            // منظور صاحب المحل لأول مرة
            const encEmail = btoa(email);
            const encPass = btoa(password);
            const encPhone = btoa(phone);

            generatedUrl = window.location.origin + window.location.pathname + `?e=${encEmail}&p=${encPass}&ph=${encPhone}&d=${birthdate}`;
            generateQrBtn.disabled = false;
            alert('تم حفظ البيانات بنجاح! اضغط على زر "إنشاء باركود QR" لتوليد الكود الثابت للزبون.');
        }

        // قفل الحقول مجدداً مع الإبقاء على القيم الجديدة المعدلة ثابتة
        inputs.forEach(input => input.disabled = true);
        saveBtn.style.display = 'none';
        editBtn.style.display = 'block';
        saveBtn.disabled = false;
        saveBtn.innerText = "حفظ / Save";
    });

    generateQrBtn.addEventListener('click', function() {
        if (!generatedUrl) return;
        window.history.pushState({}, '', generatedUrl);
        refreshQRCode(generatedUrl);
    });

    editBtn.addEventListener('click', function() {
        inputs.forEach(input => input.disabled = false);
        editBtn.style.display = 'none';
        saveBtn.style.display = 'block';
        
        if (!isCustomerMode) {
            generateQrBtn.disabled = true; 
            qrSection.style.display = 'none'; 
        }
    });
</script>

</body>
</html>
