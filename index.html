<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفظ بيانات الزبون</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0c0d0e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #161719;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        /* قسم الشعارات العلوي مرتب من اليسار إلى اليمين */
        .logos-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            direction: ltr; /* لضمان الترتيب من اليسار لليمن */
            padding: 0 10px;
        }

        .logos-container img {
            height: 40px;
            object-fit: contain;
        }

        /* شعار آبل يحتاج تحديد عرض مناسب وتنسيق دائري خفيف مثل الصورة */
        .apple-logo {
            width: 40px;
            border: 1px solid #555;
            border-radius: 50%;
            padding: 4px;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            background-color: #212327;
            border: 1px solid #31353d;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            text-align: right;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            /* توهج خفيف حول الحقول كما يظهر بالصورة */
            box-shadow: 0 0 4px rgba(255, 193, 7, 0.1);
        }

        .form-group input:focus {
            border-color: #ffa000;
            box-shadow: 0 0 8px rgba(255, 160, 0, 0.3);
        }

        /* لجعل حقول النص بالإنجليزية تظهر بشكل صحيح مثل الإيميل والهاتف والرمز */
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="tel"] {
            direction: ltr;
            text-align: left;
        }

        .form-group input::placeholder {
            color: #666e7a;
        }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-submit {
            background-color: #1e7e34;
            color: #ffffff;
            box-shadow: 0 0 5px rgba(30, 126, 52, 0.2);
        }

        .btn-qr {
            background-color: #5a6268;
            color: #ffffff;
            margin-bottom: 10px;
            box-shadow: 0 0 5px rgba(90, 98, 104, 0.2);
        }

        /* تم مسح قسم التذييل بالكامل لتبقى الأسفل فارغة تماماً */
        .footer-spacer {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعارات مرتبة من اليسار لليمين -->
        <div class="logos-container">
            <!-- 1. Google Play -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Google_Play_2022_icon.svg" alt="Google Play">
            
            <!-- 2. App Store (Apple) -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="App Store" class="apple-logo" style="filter: invert(0.8);">
            
            <!-- 3. Outlook -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/Microsoft_Office_Outlook_%282018%E2%80%93present%29.svg" alt="Outlook">
            
            <!-- 4. Steam -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" alt="Steam">
        </div>

        <!-- الإستمارة -->
        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label>(Email) البريد الإلكتروني</label>
                <input type="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label>(Password) كلمة المرور</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>(Phone Number) رقم الهاتف</label>
                <input type="tel" placeholder="07xxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label>(Birthdate) تاريخ الميلاد</label>
                <select required>
                    <option value="" disabled selected hidden></option>
                    <!-- يمكنك إضافة خيارات السنوات أو الأيام هنا لاحقاً بالـ JS أو يدوياً -->
                    <option value="1">اختر التاريخ...</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit">حفظ بيانات الزبون</button>
            <button type="button" class="btn btn-qr">إنشاء باركود QR للزبون</button>
        </form>

        <!-- مساحة سفلية فارغة تماماً بدون نصوص أو أزرار إضافية -->
        <div class="footer-spacer"></div>
    </div>

</body>
</html>
