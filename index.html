<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات الزبون</title>
    <!-- تضمين مكتبة توليد الـ QR Code لتعمل مباشرة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #12131a;
            border: 1px solid #1f222f;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 30px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* قسم الشعارات العلوي */
        .brands-header {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1f222f;
        }

        .brand-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #e5e7eb;
            background: #1a1c26;
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid #2d3142;
        }

        .brand-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        /* تنسيق الحقول */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #9ca3af;
        }

        /* المستطيلات مع الظل الأصفر المحيط بها */
        .input-field {
            width: 100%;
            background-color: #1a1c26;
            border: 1px solid #2d3142;
            border-radius: 12px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            box-shadow: 0 0 8px rgba(212, 163, 89, 0.2);
            transition: all 0.3s ease;
        }

        /* تأثير التوهج عند الضغط */
        .input-field:focus {
            border-color: #d4a359;
            box-shadow: 0 0 12px rgba(212, 163, 89, 0.5);
        }

        /* تنسيق اتجاه الحقول للغات الأجنبية والأرقام */
        .input-field[type="email"],
        .input-field[type="text"],
        .input-field[type="tel"] {
            text-align: left;
            direction: ltr;
        }

        .input-field[type="date"] {
            direction: ltr;
            text-align: right;
            cursor: pointer;
        }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: background-color 0.2s;
        }

        .btn-submit {
            background-color: #13542b;
            color: #ffffff;
            margin-top: 25px;
        }

        .btn-submit:hover {
            background-color: #1a6e3a;
        }

        .btn-qr {
            background-color: #374151;
            color: #e5e7eb;
        }

        .btn-qr:hover {
            background-color: #4b5563;
        }

        /* حاوية الـ QR Code البيضاء */
        #qrcode-container {
            margin-top: 25px;
            display: none; /* مخفي افتراضياً حتى يتم التوليد */
            justify-content: center;
            align-items: center;
            background: #ffffff;
            padding: 15px;
            border-radius: 16px;
            max-width: 200px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 15px rgba(212, 163, 89, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- قسم الشعارات -->
        <div class="brands-header">
            <div class="brand-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/App_Store_%28iOS%29.svg" alt="App Store" class="brand-logo">
                <span>App Store</span>
            </div>
            <div class="brand-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/Microsoft_Office_Outlook_%282018%E2%80%93present%29.svg" alt="Outlook" class="brand-logo">
                <span>Outlook</span>
            </div>
            <div class="brand-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" alt="Steam" class="brand-logo">
                <span>Steam</span>
            </div>
        </div>

        <!-- النموذج مع منع التحديث تلقائياً -->
        <form id="customerForm" onsubmit="event.preventDefault();">
            
            <div class="form-group">
                <label>البريد الإلكتروني (Email)</label>
                <!-- إضافة الـ id الصحيح للحقل ليعمل الـ JS -->
                <input type="email" id="customerEmail" class="input-field" required>
            </div>

            <div class="form-group">
                <label>كلمة المرور (Password)</label>
                <!-- إضافة الـ id الصحيح للحقل ليعمل الـ JS -->
                <input type="text" id="customerPassword" class="input-field" placeholder="أدخل كلمة المرور" required>
            </div>

            <div class="form-group">
                <label>رقم الهاتف (Phone Number)</label>
                <!-- إضافة الـ id الصحيح للحقل ليعمل الـ JS -->
                <input type="tel" id="customerPhone" class="input-field" placeholder="+964..." required>
            </div>

            <div class="form-group">
                <label>تاريخ الميلاد (Birthdate)</label>
                <!-- إضافة الـ id الصحيح للحقل ليعمل الـ JS -->
                <input type="date" id="customerDate" class="input-field" required>
            </div>

            <button type="button" class="btn btn-submit" onclick="saveData()">حفظ بيانات الزبون</button>
            <button type="button" class="btn btn-qr" onclick="generateQR()">إنشاء باركود QR للزبون</button>

            <!-- هنا سيظهر الباركود تلقائياً -->
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>

        </form>
    </div>

    <script>
        // دالة حفظ البيانات في ذاكرة المتصفح
        function saveData() {
            const email = document.getElementById('customerEmail').value;
            const password = document.getElementById('customerPassword').value;
            const phone = document.getElementById('customerPhone').value;
            const date = document.getElementById('customerDate').value;

            if(!email || !password || !phone || !date) {
                alert("يرجى ملأ جميع الحقول أولاً قبل الحفظ.");
                return;
            }

            const data = { email, password, phone, date };
            localStorage.setItem('savedCustomerData', JSON.stringify(data));
            
            // تنبيه بسيط ومخفي داخل الكونسول للتأكيد دون تخريب التصميم
            console.log("تم حفظ البيانات بنجاح في المتصفح!");
        }

        // دالة إنشاء الباركود وقراءته عبر الهاتف
        function generateQR() {
            const email = document.getElementById('customerEmail').value;
            const password = document.getElementById('customerPassword').value;
            const phone = document.getElementById('customerPhone').value;
            const date = document.getElementById('customerDate').value;

            if(!email || !password || !phone || !date) {
                alert("يرجى ملأ جميع الحقول لتوليد الباركود الخاص بالزبون.");
                return;
            }

            // النص الفعلي الذي ستصوره الكاميرا وتقرأه
            const qrText = `Email: ${email}\nPassword: ${password}\nPhone: ${phone}\nBirthdate: ${date}`;

            // مسح أي باركود قديم
            document.getElementById("qrcode").innerHTML = "";
            
            // إظهار الحاوية البيضاء للباركود
            document.getElementById("qrcode-container").style.display = "flex";

            // توليد الـ QR Code الجديد بالبيانات الفعلية لتقرأه الكاميرا
            new QRCode(document.getElementById("qrcode"), {
                text: qrText,
                width: 170,
                height: 170,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // استرجاع البيانات تلقائياً وتعبئتها في الحقول عند فتح الصفحة
        window.onload = function() {
            const savedData = localStorage.getItem('savedCustomerData');
            if(savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('customerEmail').value = data.email || '';
                document.getElementById('customerPassword').value = data.password || '';
                document.getElementById('customerPhone').value = data.phone || '';
                document.getElementById('customerDate').value = data.date || '';
            }
        }
    </script>

</body>
</html>
